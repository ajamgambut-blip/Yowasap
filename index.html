<!DOCTYPE html>
<html lang="id">
<head>
   <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yowasap">
<link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yowasap</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  body { background: #ece5dd; height: 100vh; overflow: hidden; }

.header {
    background: #075E54;
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    height: 56px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 10;
  }

  /* KIRI: TULISAN YOWASAP */
.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
  }
.header-left img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid white;
  }
.header-info h1 { font-size: 17px; font-weight: 500; }
.header-info p { font-size: 12px; opacity: 0.8; }

  /* TENGAH: FOTO GRUP PAS DI TENGAH BENERAN */
.header-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
  }
.header-center img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
    cursor: pointer;
  }

  /* KAN: ICON VC TELPON */
.header-icons {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-size: 20px;
    z-index: 2;
  }
.header-icons span { cursor: pointer; }

.chat {
    padding: 70px 8px 60px 8px;
    height: 100vh;
    overflow-y: auto;
    background: #ece5dd;
  }
.bubble {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin: 8px 0;
    max-width: 75%;
  }
.bubble.me { margin-left: auto; flex-direction: row-reverse; }
.bubble img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }
.bubble.text {
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14.5px;
    line-height: 1.4;
    box-shadow: 0 1px 0.5px rgba(0,0,0,.13);
  }
.bubble.me.text { background: #DCF8C6; }

.input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 6px 8px;
    background: #f0f0f0;
    gap: 8px;
  }
.input-area input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 24px;
    border: none;
    outline: none;
    font-size: 15px;
    background: white;
  }
.input-area button {
    background: #128C7E;
    color: white;
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <!-- KIRI: AVATAR + NAMA -->
  <div class="header-left">
    <img id="avatarKiri" src="avatars/foto-1.png" alt="avatar" onclick="gantiNama()">
    <div class="header-info">
      <h1>Yowasap</h1>
      <p id="status">Lina online</p>
    </div>
  </div>

  <!-- TENGAH: FOTO GRUP PAS TENGAH -->
  <div class="header-center">
    <img id="headerAvatar" src="avatars/foto-grup.png" alt="grup" onclick="gantiNama()">
  </div>

  <!-- KAN: ICON -->
  <div class="header-icons">
    <span onclick="alert('Telpon beneran belum bisa sayang 😅')">📞</span>
    <span onclick="bukaVC()">📹</span>
    <span onclick="gantiNama()">⋮</span>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="inputText" placeholder="Ketik pesan...">
  <button onclick="kirim()">➤</button>
</div>

<script>
const AVATAR_MAP = {
  "Anam": "avatars/foto-1.png",
  "Lina": "avatars/foto-2.png",
  "default": "avatars/foto-grup.png"
};

function bukaVC() {
  let room = "Yowasap Sayang Anam 123";
  let namaUser = localStorage.getItem('nama') || "Tamu";
  let url = `https://meet.jit.si/${encodeURI(room)}#userInfo.displayName="${namaUser}"`;
  window.open(url, '_blank');
}

function mintaNama() {
  let nama = prompt("Masukin nama kamu: Anam atau Lina");
  if(nama === "Anam" || nama === "Lina") {
    localStorage.setItem('nama', nama);
    location.reload();
  } else {
    alert("Ketik 'Anam' atau 'Lina' doang ya sayang");
    mintaNama();
  }
}

let nama = localStorage.getItem('nama');
if(!nama) mintaNama();

function gantiNama() {
  localStorage.removeItem('nama');
  mintaNama();
}

function pasangAvatar() {
  let lawan = nama === "Anam"? "Lina" : "Anam";

  // Avatar kiri = foto kita sendiri
  document.getElementById('avatarKiri').src = AVATAR_MAP[nama];

  // Tengah = foto grup
  document.getElementById('headerAvatar').src = AVATAR_MAP.default;

  // Status
  document.getElementById('status').innerText = lawan + " online";

  if(document.getElementById('chat').innerHTML === "") {
    document.getElementById('chat').innerHTML = `
      <div class="bubble">
        <img class="chatAvatar" src="${AVATAR_MAP[lawan]}">
        <div class="text">Halo sayang 😊</div>
      </div>
    `;
  }
}

function kirim() {
  let text = document.getElementById('inputText').value;
  if(text.trim() === "") return;
  let chat = document.getElementById('chat');
  let bubble = document.createElement('div');
  bubble.className = 'bubble me';
  bubble.innerHTML = `
    <img class="chatAvatar" src="${AVATAR_MAP[nama]}">
    <div class="text">${text}</div>
  `;
  chat.appendChild(bubble);
  document.getElementById('inputText').value = '';
  chat.scrollTop = chat.scrollHeight;
}

pasangAvatar();
document.getElementById('inputText').addEventListener('keypress', e => {
  if(e.key === 'Enter') kirim();
});
</script>

</body>
</html>
