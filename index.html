<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#128c7e">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Roboto,sans-serif;background:#0b141a;color:#e9edef;display:flex;flex-direction:column;height:100vh}
header{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3942}
header img{width:42px;height:42px;border-radius:50%;object-fit:cover}
header div{flex:1}
#callBtn{margin-left:auto;background:#1e88e5;border:none;color:white;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px;font-weight:600}
#chat{flex:1;overflow-y:auto;padding:16px;background:#0b141a;display:flex;flex-direction:column;gap:6px}
.msg{max-width:70%;padding:8px 12px;border-radius:8px;font-size:15px;line-height:1.4;word-wrap:break-word}
.me{align-self:flex-end;background:#005c4b;border-bottom-right-radius:2px}
.them{align-self:flex-start;background:#202c33;border-bottom-left-radius:2px}
#typing{font-size:12px;color:#8696a0;padding:4px 16px;height:18px}
footer{display:flex;padding:8px;background:#202c33;gap:8px;border-top:1px solid #2a3942}
footer input{flex:1;border:none;outline:none;padding:10px 14px;border-radius:8px;background:#2a3942;color:#e9edef;font-size:15px}
footer button{border:none;background:#128c7e;color:white;padding:0 18px;border-radius:8px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<header>
<img id="herPhoto" src="">
<div>
<b id="herName">Yowasap</b><br>
<small id="onlineStatus">Menghubungkan...</small>
</div>
<button id="callBtn">📞 JisMeet</button>
</header>

<div id="chat"></div>
<div id="typing"></div>

<footer>
<input id="input" placeholder="Ketik pesan..." autocomplete="off">
<button id="sendBtn">Kirim</button>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getDatabase,
  ref,
  push,
  onChildAdded,
  set,
  onDisconnect,
  onValue
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCZHDGHSMBT8g8xs2H78yhDx0dbEv2H0x",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user') || prompt("Nama kamu: lina / anam") || "lina";
const roomId = urlParams.get('room') || prompt("Nama room:") || "yowasap";

const otherUser = user === "anam" ? "lina" : "anam";
document.getElementById('herName').textContent = otherUser === "lina" ? "Lina" : "Anam";

// INI FOTO KAMU BERDUA YANG ASLI - GA GANTI LAGI SUMPAH
document.getElementById('herPhoto').src = otherUser === "lina" 
  ? "https://i.imgur.com/BgaNlVM.jpeg" 
  : "https://i.imgur.com/wfPOwQN.jpeg";

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('sendBtn');
const typingDiv = document.getElementById('typing');
const onlineStatus = document.getElementById('onlineStatus');

signInAnonymously(auth)
.then(() => {
  const msgRef = ref(db, 'rooms/' + roomId + '/messages');
  const typingRef = ref(db, 'rooms/' + roomId + '/typing/' + user);
  const otherTypingRef = ref(db, 'rooms/' + roomId + '/typing/' + otherUser);
  const onlineRef = ref(db, 'rooms/' + roomId + '/online/' + user);
  const otherOnlineRef = ref(db, 'rooms/' + roomId + '/online/' + otherUser);

  set(onlineRef, true);
  onDisconnect(onlineRef).set(false);
  onValue(otherOnlineRef, snap => {
    onlineStatus.textContent = snap.val() ? "Online" : "Offline";
  });

  onChildAdded(msgRef, snap => {
    const msg = snap.val();
    const div = document.createElement('div');
    div.className = 'msg ' + (msg.user === user ? 'me' : 'them');
    div.textContent = msg.text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  input.addEventListener('input', () => set(typingRef, input.value.length > 0));
  onValue(otherTypingRef, snap => {
    typingDiv.textContent = snap.val() ? otherUser + " sedang mengetik..." : "";
  });

  async function sendMsg(){

  if(!input.value.trim()) return;

  try{

    await push(msgRef,{
      user,
      text:input.value,
      time:Date.now()
    });

    input.value="";
    set(typingRef,false);

  }catch(e){

    console.error(e);

    alert(e.message);

  }

}
  btn.onclick = sendMsg;
input.onkeypress = e => e.key === 'Enter' && sendMsg();

})
.catch(err=>{
    console.error(err);
    alert(err.code + "\n" + err.message);
});
document.getElementById('callBtn').onclick = () => {
  const jitsiLink = `https://meet.jit.si/${roomId}#userInfo.displayName="${user}"`;
  window.open(jitsiLink, '_blank');
};

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
