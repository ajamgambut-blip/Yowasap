<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA KW Kita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex-col">
  
  <div class="bg-green-600 text-white p-4 shadow">
    <h1 class="text-xl font-bold">Chat Pribadi</h1>
  </div>

  <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
    <div class="text-center text-gray-400 text-sm">Loading chat...</div>
  </div>

  <div class="p-3 bg-white flex gap-2 border-t shadow-inner">
    <input id="pesanInput" type="text" placeholder="Ketik pesan..." class="flex-1 border rounded-full px-4 py-2">
    <button id="btnKirim" class="bg-green-600 text-white rounded-full px-5 py-2 font-bold">Kirim</button>
  </div>

  <script>
    // KODE SUPABASE MINI - FETCH MANUAL NGGAK PAKE LIBRARY
    const SUPABASE_URL = 'https://kdxqnlsbmpvnfokpr.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkeHFubHFsc2JtcHZuZm9rcnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTEyMTAsImV4cCI6MjA5Nzc4NzIxMH0.oR1FPVubwV3P_tY26tLICuoB8JZhRlsAYpyhkDPpiuM'
    
    async function loadPesan() {
      const chatBox = document.getElementById('chatBox')
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pesan?select=*&order=dibuat_pada.asc`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY
          }
        })
        if(!res.ok) throw new Error('HTTP ' + res.status)
        const data = await res.json()
        
        if(data.length === 0) {
          chatBox.innerHTML = `<div class="text-center text-gray-400 text-sm">Belum ada pesan</div>`
          return
        }
        
        chatBox.innerHTML = ''
        data.forEach(p => {
          const bubble = document.createElement('div')
          bubble.className = 'flex justify-end'
          bubble.innerHTML = `<div class="bg-green-500 text-white px-4 py-2 rounded-2xl rounded-br-none max-w-[70%]">${p.isi}</div>`
          chatBox.appendChild(bubble)
        })
        chatBox.scrollTop = chatBox.scrollHeight
        
      } catch(err) {
        chatBox.innerHTML = `<div class="text-red-500 text-center text-sm">Error DB: ${err.message}</div>`
      }
    }
    
    async function kirimPesan() {
      const input = document.getElementById('pesanInput')
      const text = input.value.trim()
      if(text === '') return
      
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/pesan`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ pengirim: 'Aku', isi: text })
        })
        
        if(!res.ok) throw new Error('HTTP ' + res.status)
        input.value = ''
        loadPesan()
        
      } catch(err) {
        alert('GAGAL KIRIM: ' + err.message)
      }
    }
    
    document.getElementById('btnKirim').onclick = kirimPesan
    document.getElementById('pesanInput').addEventListener('keypress', e => {
      if(e.key === 'Enter') kirimPesan()
    })
    
    loadPesan()
    setInterval(loadPesan, 3000)
  </script>
</body>
</html>
