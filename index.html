<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yowasap</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-bg {
    background-color: #e5ddd5;
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns=N/A%3E%3Cg fill='%239C92AC' fill-opacity='0.08' fill-rule='evenodd'%3E%3Ccircle cx='40' cy='40' r='1'/%3E%3C/g%3E%3C/svg%3E");
  }
</style>
</head>
<body class="h-screen flex flex-col bg-[#e5ddd5]">

  <!-- HEADER + TOMBOL VC -->
  <div class="bg-[#075e54] text-white p-3 flex items-center gap-3 shadow-md flex-shrink-0">
    <div class="flex-1">
      <h1 class="font-medium text-base">Yowasap</h1>
      <p id="status" class="text-xs opacity-80">online</p>
    </div>
    <button id="btnCall" class="p-2 hover:bg-[#128c7e] rounded-full active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
      </svg>
    </button>
  </div>

  <!-- SETTING PROFIL -->
  <div class="bg-white/95 backdrop-blur px-3 py-2 flex items-center gap-2 flex-shrink-0">
    <span class="text-sm text-gray-600">Nama</span>
    <input id="nameInput" class="flex-1 text-sm bg-gray-100 rounded-lg px-2 py-1 outline-none" placeholder="Nama kamu">
    <button id="gantiFoto" class="text-sm text-[#075e54] font-medium">Ganti Foto</button>
  </div>

  <!-- CHAT AREA - INI KUNCINYA -->
  <div id="chatBox" class="flex-1 min-h-0 overflow-y-auto p-3 space-y-0.5 chat-bg"></div>

  <!-- INPUT BAWAH -->
  <div class="p-2 bg-[#f0f0f0] flex items-end gap-2 flex-shrink-0">
    <button class="p-2 text-gray-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.414a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
    </button>
    <input id="msgInput" class="flex-1 bg-white rounded-full px-4 py-2 text-sm outline-none" placeholder="Ketik pesan">
    <button id="sendBtn" class="bg-[#25D366] p-2.5 rounded-full active:scale-95">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

<script>
// KODE VC - 3 BARIS DOANG
document.getElementById('btnCall').onclick = () => {
  const room = 'Yowasap-' + (document.getElementById('nameInput').value || 'Aku') + '-Anam'
  window.open('https://meet.jit.si/' + room, '_blank')
}

// Sisa kode Firebase chat kamu tempel di bawah sini...
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
    authDomain: "yowasap.firebaseapp.com",
    databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "yowasap",
    storageBucket: "yowasap.firebasestorage.app",
    messagingSenderId: "964491262310",
    appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const chatRef = ref(db, 'chat');

  const chatBox = document.getElementById('chatBox');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const nameInput = document.getElementById('nameInput');

  function myName() {
    return nameInput.value || 'Aku';
  }

  // KIRIM PESAN
  sendBtn.onclick = () => {
    const text = msgInput.value.trim();
    if(text === '') return;
    push(chatRef, {
      name: myName(),
      text: text,
      time: new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'})
    });
    msgInput.value = '';
  }

  // TERIMA PESAN
  onChildAdded(chatRef, (snapshot) => {
    const data = snapshot.val();
    const isMe = data.name === myName();
    
    const div = document.createElement('div');
    div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
    div.innerHTML = `
      <div class="max-w-[75%] px-3 py-2 rounded-lg shadow-sm ${isMe ? 'bg-[#dcf8c6] rounded-br-none' : 'bg-white rounded-bl-none'}">
        ${!isMe ? `<p class="text-xs font-bold text-[#075e54] mb-0.5">${data.name}</p>` : ''}
        <p class="text-sm text-gray-800">${data.text}</p>
        <p class="text-[10px] text-gray-500 text-right mt-0.5">${data.time}</p>
      </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });

  // TOMBOL VC
  document.getElementById('btnCall').onclick = () => {
    const room = 'Yowasap-' + myName() + '-Anam'
    window.open('https://meet.jit.si/' + room, '_blank')
  }
</script>
</script>
</body>
</html>
