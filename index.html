<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yowasap</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  body { background: #ece5dd; height: 100vh; overflow: hidden; }

  /* HEADER IJO WA BENERAN */
 .header {
    background: #075E54;
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    height: 56px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 10;
  }
 .header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }
 .header-info { flex: 1; }
 .header-info h1 { font-size: 17px; font-weight: 500; }
 .header-info p { font-size: 12px; opacity: 0.8; }
 .header-icons { display: flex; gap: 20px; font-size: 20px; }

  /* CHAT AREA */
 .chat {
    padding: 70px 8px 60px 8px;
    height: 100vh;
    overflow-y: auto;
    background: #ece5dd;
  }
 .bubble {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin: 8px 0;
    max-width: 75%;
  }
 .bubble.me { margin-left: auto; flex-direction: row-reverse; }
 .bubble img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }
 .bubble.text {
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14.5px;
    line-height: 1.4;
    box-shadow: 0 1px 0.5px rgba(0,0,0,.13);
  }
 .bubble.me.text { background: #DCF8C6; }

  /* INPUT BAWAH WA STYLE */
 .input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 6px 8px;
    background: #f0f0f0;
    gap: 8px;
  }
 .input-area input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 24px;
    border: none;
    outline: none;
    font-size: 15px;
    background: white;
  }
 .input-area button {
    background: #128C7E;
    color: white;
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- HEADER: FOTO COUPLE DI TENGAH -->
<div class="header">
  <img id="headerAvatar" src="avatars/foto-grup.png" alt="avatar">
  <div class="header-info">
    <h1>Yowasap</h1>
    <p>online</p>
  </div>
  <div class="header-icons">
    <span>📞</span>
    <span>📹</span>
    <span>⋮</span>
  </div>
</div>

<!-- CHAT CONTOH -->
<div class="chat" id="chat">
  <div class="bubble">
    <img class="chatAvatar" src="">
    <div class="text">Halo sayang 😊</div>
  </div>
  <div class="bubble me">
    <img class="chatAvatar" src="">
    <div class="text">Iya kamu lagi ngapain?</div>
  </div>
</div>

<!-- INPUT CHAT -->
<div class="input-area">
  <input type="text" id="inputText" placeholder="Ketik pesan...">
  <button onclick="kirim()">➤</button>
</div>

<script>
// ===== SETTING AVATAR =====
const AVATAR_MAP = {
  "Anam": "avatars/foto-1.png",
  "Lina": "avatars/foto-2.png",
  "default": "avatars/foto-grup.png"
};

let nama = localStorage.getItem('nama');
if(!nama) {
  nama = prompt("Masukin nama kamu: Anam atau Lina");
  localStorage.setItem('nama', nama);
}

function pasangAvatar() {
  document.getElementById('headerAvatar').src = AVATAR_MAP.default;
  document.querySelectorAll('.chatAvatar').forEach(img => {
    let bubble = img.closest('.bubble');
    if(bubble.classList.contains('me')) {
      img.src = AVATAR_MAP[nama] || AVATAR_MAP.default;
    } else {
      let namaLawan = nama === "Anam"? "Lina" : "Anam";
      img.src = AVATAR_MAP[namaLawan] || AVATAR_MAP.default;
    }
  });
}

function kirim() {
  let text = document.getElementById('inputText').value;
  if(text.trim() === "") return;
  let chat = document.getElementById('chat');
  let bubble = document.createElement('div');
  bubble.className = 'bubble me';
  bubble.innerHTML = `
    <img class="chatAvatar" src="${AVATAR_MAP[nama]}">
    <div class="text">${text}</div>
  `;
  chat.appendChild(bubble);
  document.getElementById('inputText').value = '';
  chat.scrollTop = chat.scrollHeight;
}

pasangAvatar();
document.getElementById('inputText').addEventListener('keypress', e => {
  if(e.key === 'Enter') kirim();
});
</script>

</body>
</html>
