<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Lina & Anam</title>
<style>
  body{margin:0;font-family:sans-serif;background:#0b141a;color:#e9edef;display:flex;flex-direction:column;height:100vh}
  header{display:flex;align-items:center;gap:12px;padding:10px;background:#202c33;border-bottom:1px solid #2a3942}
  header img{width:40px;height:40px;border-radius:50%;object-fit:cover}
  header h3{margin:0;font-size:16px} header p{margin:0;font-size:12px;color:#8696a0}
  header button{margin-left:auto;background:#128c7e;border:none;padding:8px 12px;border-radius:50%;color:white;font-size:18px;cursor:pointer}
  #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:65%;padding:8px 12px;border-radius:8px;word-wrap:break-word;position:relative}
  .me{align-self:flex-end;background:#005c4b;color:white}
  .her{align-self:flex-start;background:#202c33}
  .ticks{font-size:11px;margin-left:6px;color:#53bdeb}
  #typing{font-size:12px;color:#8696a0;padding:0 16px 4px;font-style:italic;height:16px}
  #inputBox{display:flex;padding:10px;background:#202c33;gap:8px}
  #input{flex:1;padding:10px;border:none;border-radius:8px;background:#2a3942;color:white;outline:none}
  #sendBtn{background:#128c7e;border:none;padding:0 20px;border-radius:8px;color:white;font-weight:bold;cursor:pointer}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#128c7e">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<header>
  <img id="herPhoto" src="" alt="Foto">
  <div>
    <h3 id="herName">Nama</h3>
    <p id="onlineStatus">Offline</p>
  </div>
  <button id="callBtn">📞</button>
</header>

<div id="chat"></div>
<div id="typing"></div>

<div id="inputBox">
  <input id="input" type="text" placeholder="Ketik pesan...">
  <button id="sendBtn">Kirim</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onChildAdded, set, onValue, update, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 1. GANTI CONFIG FIREBASE KAMU
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getDatabase();

const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user') || 'anam';
const roomId = 'pacar-lina-anam-2026';
const otherUser = user === 'anam' ? 'lina' : 'anam';

const herName = user === 'anam' ? 'Lina' : 'Anam';
const herPhoto = user === 'anam' ? 'https://i.imgur.com/BgaNlVM.jpeg' : 'https://i.imgur.com/wfPOwQN.jpeg';

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('sendBtn');
const typingDiv = document.getElementById('typing');
const onlineStatus = document.getElementById('onlineStatus');

document.getElementById('herName').textContent = herName;
document.getElementById('herPhoto').src = herPhoto;

signInAnonymously(auth).then(() => {
  const msgRef = ref(db, 'rooms/' + roomId + '/messages');
  const typingRef = ref(db, 'rooms/' + roomId + '/typing/' + user);
  const otherTypingRef = ref(db, 'rooms/' + roomId + '/typing/' + otherUser);
  const onlineRef = ref(db, 'rooms/' + roomId + '/online/' + user);
  const otherOnlineRef = ref(db, 'rooms/' + roomId + '/online/' + otherUser);

  // 2. STATUS ONLINE ASLI
  set(onlineRef, true);
  onDisconnect(onlineRef).set(false);
  onValue(otherOnlineRef, snap => {
    onlineStatus.textContent = snap.val() ? 'Online' : 'Offline';
    onlineStatus.style.color = snap.val() ? '#25d366' : '#8696a0';
  });

  // 3. SEDANG MENGETIK
  let typingTimeout;
  input.oninput = () => {
    set(typingRef, true);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => set(typingRef, false), 2000);
  };
  onValue(otherTypingRef, snap => {
    typingDiv.textContent = snap.val() ? `${herName} sedang mengetik...` : '';
  });

  // 4. TAMPILIN PESAN + CENTANG BIRU
  onChildAdded(msgRef, (snap) => {
    const data = snap.val();
    const msgId = snap.key;
    const div = document.createElement('div');
    div.id = msgId;
    div.className = 'msg ' + (data.sender === user ? 'me' : 'her');
    
    let ticks = '';
    if (data.sender === user) {
      ticks = data.read ? '<span class="ticks">✓</span>' : '<span class="ticks">✓</span>';
    }
    div.innerHTML = data.text + ticks;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    // Tandai dibaca kalo pesan orang lain
    if (data.sender !== user && !data.read) {
      update(ref(db, 'rooms/' + roomId + '/messages/' + msgId), { read: true });
    }
    // Update centang jadi biru kalo udah dibaca
    if (data.sender === user && data.read) {
      const el = document.getElementById(msgId);
      if (el) el.querySelector('.ticks').innerHTML = '✓';
    }

    if (data.sender !== user && document.hidden) {
  // Minta izin dulu kalo belum pernah
  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
  
  // Tunggu 0.5 detik baru munculin notif
  setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification(herName + ' 💌', {
        body: data.text,
        icon: herPhoto,
        tag: 'chat-lina-anam'
      });
    }
  }, 500);
}

  btn.onclick = () => {
    const text = input.value.trim();
    if (text) {
      push(msgRef, { sender: user, text: text, time: serverTimestamp(), read: false });
      input.value = '';
      set(typingRef, false);
    }
  };
  input.onkeypress = e => { if (e.key === 'Enter') btn.click() };

  if (Notification.permission !== 'granted') Notification.requestPermission();
  
  // 5. TELPON JITSI
  document.getElementById('callBtn').onclick = () => {
  location.href = `https://meet.jit.si/${roomId}`;
};
});
// Daftarin Service Worker buat PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('SW terdaftar!');
  });
}
</script>
</body>
</html>
