<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#e5ddd5;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  background:#075E54;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CHAT */
#chatBox{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background-image:url("https://i.imgur.com/qLX3X5X.png");
  background-size:300px;
}

/* MESSAGE */
.msg{
  max-width:75%;
  padding:8px 10px;
  border-radius:10px;
  font-size:14px;
  box-shadow:0 1px 1px rgba(0,0,0,0.1);
}

.msg.me{
  background:#dcf8c6;
  align-self:flex-end;
  border-top-right-radius:0;
}

.msg.other{
  background:white;
  align-self:flex-start;
  border-top-left-radius:0;
}

.time{
  font-size:10px;
  color:#667781;
  float:right;
}

/* INPUT */
.input{
  display:flex;
  padding:8px;
  background:#f0f0f0;
  gap:8px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button{
  border:none;
  background:#075E54;
  color:white;
  border-radius:50%;
  width:42px;
  height:42px;
}
</style>
</head>

<body>

<div class="header">
  <div>💬 Yowasap PRO</div>
  <button onclick="startCall()">📞</button>
</div>

<div id="chatBox"></div>

<div class="input">
  <input id="input" placeholder="Ketik pesan...">
  <button onclick="send()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= USER ================= */
let myId;
let roomId = prompt("Room ID") || "default-room";

firebase.auth().signInAnonymously().then(u=>{
  myId = u.user.uid;
  initChat();
  listenCall();
});

/* ================= CHAT ================= */
const chatRef = db.ref("chats/"+roomId+"/messages");
const chatBox = document.getElementById("chatBox");

function send(){
  let text = document.getElementById("input").value;
  if(!text.trim()) return;

  chatRef.push({
    text,
    senderId: myId,
    time: Date.now()
  });

  document.getElementById("input").value="";
}

function render(msg){
  const div = document.createElement("div");
  div.className = "msg " + (msg.senderId===myId ? "me":"other");

  let t = new Date(msg.time).toLocaleTimeString([],{
    hour:"2-digit",minute:"2-digit"
  });

  div.innerHTML = `
    ${msg.text}
    <span class="time">${t}</span>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function initChat(){
  chatRef.on("child_added", snap=>{
    render(snap.val());
  });
}

/* ================= CALL SYSTEM ================= */
const callRef = db.ref("calls/"+roomId);

/* ringtone */
const ring = new Audio("https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg");
ring.loop = true;

/* START CALL */
function startCall(){
  const room = "call_"+roomId;

  callRef.set({
    from: myId,
    status: "ringing",
    room
  });
}

/* LISTEN CALL */
function listenCall(){
  callRef.on("value", snap=>{
    const c = snap.val();
    if(!c) return;

    if(c.status==="ringing" && c.from!==myId){
      showIncoming(c.room);
    }

    if(c.status==="accepted"){
      ring.pause();
      openCall(c.room);
    }

    if(c.status==="ended"){
      closeCall();
    }
  });
}

/* INCOMING UI */
function showIncoming(room){
  ring.play();

  if(document.getElementById("inc")) return;

  const box = document.createElement("div");
  box.id="inc";
  box.style=`
    position:fixed;inset:0;
    background:#075E54;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
  `;

  box.innerHTML=`
    <h2>📞 Incoming Call</h2>
    <button onclick="accept('${room}')">Accept</button>
    <button onclick="reject()">Reject</button>
  `;

  document.body.appendChild(box);
}

/* ACCEPT */
function accept(room){
  callRef.update({status:"accepted"});
  ring.pause();
  openCall(room);
}

/* REJECT */
function reject(){
  ring.pause();
  callRef.update({status:"ended"});
  document.getElementById("inc")?.remove();
}

/* CALL UI */
let timer,sec=0;

function openCall(room){
  const ui=document.createElement("div");
  ui.id="callUI";
  ui.style=`
    position:fixed;inset:0;background:black;z-index:9999;
  `;

  ui.innerHTML=`
    <iframe src="https://meet.jit.si/${room}"
      style="width:100%;height:100%;border:0"></iframe>

    <button onclick="endCall()"
      style="position:absolute;bottom:20px;left:50%;
      transform:translateX(-50%);
      background:red;color:white;padding:12px;border-radius:50%;">
      END
    </button>

    <div id="t" style="position:absolute;top:20px;left:20px;color:white;">
      00:00
    </div>
  `;

  document.body.appendChild(ui);

  sec=0;
  timer=setInterval(()=>{
    sec++;
    let m=String(Math.floor(sec/60)).padStart(2,"0");
    let s=String(sec%60).padStart(2,"0");
    document.getElementById("t").innerText=m+":"+s;
  },1000);
}

/* END CALL */
function endCall(){
  clearInterval(timer);
  callRef.update({status:"ended"});
  document.getElementById("callUI")?.remove();
  document.getElementById("inc")?.remove();
}
</script>

</body>
</html>
