<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Yowasap</title>
<script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>.chat-bg{background-color:#efeae2}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#c1c1c1;border-radius:5px}</style>
</head><body class="bg-gray-100 font-sans h-screen overflow-hidden">
<div id="overlay" class="hidden fixed inset-0 bg-black/40 z-40" onclick="toggleSidebar()"></div>
<div id="login-screen" class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center absolute inset-0 m-auto h-fit"><h1 class="text-3xl font-bold text-emerald-600 mb-6"><i class="fab fa-whatsapp mr-2"></i>Yowasap</h1><div class="space-y-3"><button onclick="loginAs('User1','Anam')" class="w-full bg-emerald-600 text-white py-2 rounded-lg">Masuk sebagai Anam</button><button onclick="loginAs('User2','Lina')" class="w-full bg-blue-600 text-white py-2 rounded-lg">Masuk sebagai Lina</button></div></div>
<div id="main-screen" class="hidden w-full h-screen flex"><div class="flex-1 flex-col"><div class="bg-gray-100 border-b p-3 flex items-center gap-3"><img src="https://placehold.co/40" class="w-10 h-10 rounded-full"><div><h3 id="chat-header-name" class="font-semibold">Lina</h3><p id="chat-header-status" class="text-xs text-gray-500">Online</p></div></div><div id="chat-box" class="flex-1 overflow-y-auto p-4 chat-bg space-y-3"></div><div id="typing-indicator" class="hidden px-4 py-1 text-xs italic text-gray-500">Sedang mengetik...</div><div class="bg-gray-100 border-t p-3 flex gap-2"><input id="message-input" type="text" oninput="handleTyping()" placeholder="Ketik pesan..." class="flex-1 border rounded-full px-4 py-2"><button onclick="sendMessage()" class="bg-emerald-600 text-white w-11 h-11 rounded-full"><i class="fas fa-paper-plane"></i></button></div></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, push, onValue, onDisconnect, serverTimestamp, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
const firebaseConfig={databaseURL:"https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app/"};
const app=initializeApp(firebaseConfig);const db=getDatabase(app);let currentUser=null;let currentName=null;let targetUser=null;let typingTimeout=null;
window.loginAs=function(userId,userName){currentUser=userId;currentName=userName;targetUser=userId==="User1"?"User2":"User1";document.getElementById('login-screen').classList.add('hidden');document.getElementById('main-screen').classList.remove('hidden');document.getElementById('chat-header-name').innerText=targetUser==="User1"?"Anam":"Lina";update(ref(db,'users/'+currentUser),{name:currentName,status:"online",lastSeen:serverTimestamp()});listenMessages();setupPresence();}
function setupPresence(){const el=document.getElementById('chat-header-status');const myRef=ref(db,`users/${currentUser}`);const otherRef=ref(db,`users/${targetUser}`);onDisconnect(myRef).update({status:'offline',lastSeen:serverTimestamp()});update(myRef,{status:'online',lastSeen:serverTimestamp()});onValue(otherRef,(snap)=>{const data=snap.val();if(!data||data.status!=='offline'){el.textContent='Online';return;}const t=new Date(data.lastSeen*1000).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});el.textContent=`Terakhir dilihat ${t}`;});}
window.sendMessage=function(){const i=document.getElementById('message-input');const t=i.value.trim();if(!t||!currentUser)return;const c=[currentUser,targetUser].sort().join('_');push(ref(db,'messages/'+c),{sender:currentUser,name:currentName,text:t,timestamp:Date.now()});i.value='';set(ref(db,'typing/'+c+'/'+currentUser),false);}
document.getElementById('message-input').addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});
window.listenMessages=function(){const c=[currentUser,targetUser].sort().join('_');const b=document.getElementById('chat-box');onValue(ref(db,'messages/'+c),s=>{b.innerHTML='';s.forEach(d=>{const m=d.val();const me=m.sender===currentUser;b.innerHTML+=`<div class="flex ${me?'justify-end':'justify-start'}"><div class="max-w-xs p-2 rounded-lg ${me?'bg-emerald-500 text-white':'bg-white'}"><p class="text-sm">${m.text}</p><span class="text-[10px] opacity-70">${new Date(m.timestamp).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</span></div></div>`;});b.scrollTop=b.scrollHeight;});}
window.handleTyping=function(){if(!currentUser)return;const c=[currentUser,targetUser].sort().join('_');const r=ref(db,'typing/'+c+'/'+currentUser);set(r,true);clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>set(r,false),2000);}
window.toggleSidebar=function(){document.getElementById("overlay").classList.toggle("hidden");}
</script></body></html>
