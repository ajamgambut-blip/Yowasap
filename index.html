<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA KW Kita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex-col">

  <!-- Header ijo ala WA -->
  <div class="bg-green-600 text-white p-4 shadow">
    <h1 class="text-xl font-bold">Chat Pribadi</h1>
  </div>

  <!-- Area chat -->
  <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3">
    <div class="text-center text-gray-400 text-sm">Selamat datang sayang 💚</div>
  </div>

  <!-- Input bawah -->
  <div class="p-3 bg-white flex gap-2 border-t">
    <input id="pesanInput" type="text" placeholder="Ketik pesan..." 
      class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
    <button onclick="kirimPesan()" 
      class="bg-green-600 text-white rounded-full px-5 py-2 font-bold">
      Kirim
    </button>
  </div>

  <!-- KABEL INTERNET SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- MESIN CHAT + DATABASE -->
  <script>
    // 1. COLOK KUNCINYA
    const SUPABASE_URL = 'https://kdxqnlsbmpvnfokpr.supabase.co'
    const SUPABASE_KEY = 'sb_publishable__0CXL3iCW4_pV8fB08r-CWw_xk28fRVV'
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

    // 2. KIRIM PESAN KE DATABASE
    async function kirimPesan() {
      const input = document.getElementById('pesanInput')
      const text = input.value.trim()
      if(text === '') return

      const { error } = await supabase
        .from('pesan')
        .insert([{ pengirim: 'Aku', isi: text }])

      if(error) {
        alert('Gagal kirim: ' + error.message)
      } else {
        input.value = ''
        loadPesan() // refresh chat
      }
    }

    // 3. LOAD PESAN DARI DATABASE + BIKIN BUBBLE IJO
    async function loadPesan() {
      const { data, error } = await supabase
        .from('pesan')
        .select('*')
        .order('dibuat_pada', { ascending: true })

      const chatBox = document.getElementById('chatBox')
      chatBox.innerHTML = '<div class="text-center text-gray-400 text-sm">Selamat datang sayang 💚</div>'
      
      data.forEach(p => {
        const bubble = document.createElement('div')
        bubble.className = 'flex justify-end'
        bubble.innerHTML = `
          <div class="bg-green-500 text-white px-4 py-2 rounded-2xl rounded-br-none max-w-[70%]">
            ${p.isi}
          </div>
        `
        chatBox.appendChild(bubble)
      })
      chatBox.scrollTop = chatBox.scrollHeight // auto scroll
    }

    // 4. LOAD PESAN PAS BUKA HALAMAN
    loadPesan()

    // 5. ENTER BUAT NGIRIM
    document.getElementById('pesanInput').addEventListener('keypress', function(e) {
      if(e.key === 'Enter') kirimPesan()
    })
  </script>
  
</body>
</html>
