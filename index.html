<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075E54">
    
    <!-- LINK TAILWIND PLAY CDN UTUH UNTUK MEMASTIKAN DESAIN LOAD 100% -->
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        /* CSS Murni Cadangan Jika CDN Mengalami Kendala */
        body { margin: 0; padding: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: #f0f2f5; }
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://githubusercontent.com');
            background-blend-mode: overlay;
            opacity: 0.95;
        }
        /* Memaksa Login Screen Menutupi Layar Penuh Tanpa Tergantung Tailwind */
        #login-screen {
            position: fixed !important;
            top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
            background-color: #00a884 !important;
            z-index: 99999 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 16px !important;
        }
        .login-box { background: white; padding: 32px; border-radius: 8px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .login-btn { background-color: #00a884; color: white; padding: 12px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 12px; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <i class="fab fa-whatsapp text-6xl text-green-500 mb-4" style="font-size: 4rem; color: #25d366; margin-bottom: 1rem;"></i>
            <h2 class="text-2xl font-bold mb-4 text-gray-800" style="font-size: 1.5rem; margin-bottom: 1rem;">Masuk ke WA Clone</h2>
            <input type="text" id="username-input" class="login-input" placeholder="Masukkan Nama Anda...">
            <button onclick="loginUser()" class="login-btn">Mulai Chatting</button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div class="flex h-full w-full flex-row">
        <!-- Sidebar -->
        <div class="w-1/3 md:w-1/4 bg-white border-r flex flex-col h-full">
            <div class="bg-gray-200 p-3 flex justify-between items-center border-b flex-row">
                <div class="relative flex items-center">
                    <img id="my-avatar" src="https://unsplash.com" class="w-10 h-10 rounded-full object-cover border" alt="Profile" style="width:40px; height:40px; border-radius:50%;">
                    <label for="upload-avatar" class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center text-white text-xs opacity-0 hover:opacity-100 transition cursor-pointer">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="upload-avatar" class="hidden" accept="image/*" onchange="changeProfilePic(event)">
                </div>
                <div class="flex space-x-4 text-gray-600 text-lg flex-row gap-3">
                    <button id="pwa-install-btn" class="hidden text-green-600"><i class="fas fa-download"></i></button>
                    <i class="fas fa-comment-alt"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
            <!-- Daftar Kontak Aktif -->
            <div class="flex-1 overflow-y-auto" id="users-list">
                <div class="p-4 text-center text-gray-500 text-sm">Mencari pengguna lain...</div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="flex-1 flex flex-col h-full bg-gray-200">
            <!-- Header Chat -->
            <div class="bg-gray-200 p-3 flex justify-between items-center shadow-sm z-10 border-b flex-row">
                <div class="flex items-center space-x-3 flex-row gap-2">
                    <img id="chat-active-avatar" src="https://placeholder.com" class="w-10 h-10 rounded-full object-cover" style="width:40px; height:40px; border-radius:50%;">
                    <div>
                        <h3 id="chat-active-name" class="font-semibold text-gray-800 text-sm md:text-base">Pilih Kontak</h3>
                        <p id="chat-active-status" class="text-xs text-gray-500">Pilih teman di kiri</p>
                    </div>
                </div>
                <div class="flex space-x-4 text-gray-600 text-lg pr-2 flex-row gap-3">
                    <button onclick="startVideoCall()" class="hover:text-green-600"><i class="fas fa-video"></i></button>
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <!-- Area Isi Pesan -->
            <div id="chat-box" class="flex-1 chat-bg p-4 overflow-y-auto flex flex-col space-y-2">
                <div class="m-auto text-center bg-white bg-opacity-90 p-4 rounded-lg shadow text-gray-600 max-w-xs" style="margin: auto; background: white; padding: 15px; border-radius: 8px; text-align: center;">
                    <i class="fab fa-whatsapp text-4xl text-green-500 mb-2" style="font-size: 2.5rem; color:#25d366;"></i>
                    <p class="text-sm font-semibold">WhatsApp Clone</p>
                    <p class="text-xs mt-1">Pilih teman di daftar kiri untuk mulai berkirim pesan secara realtime.</p>
                </div>
            </div>

            <!-- Input Pesan -->
            <div class="bg-gray-200 p-3 flex items-center space-x-3 border-t flex-row gap-2">
                <input type="text" id="message-input" oninput="notifyTyping()" placeholder="Ketik pesan..." class="flex-1 p-2 bg-white rounded-lg focus:outline-none text-sm shadow-sm" style="width:80%; padding: 8px; border-radius: 6px; border:none;">
                <button onclick="sendMessage()" class="bg-green-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-green-600 transition shadow" style="width:40px; height:40px; background:#00a884; border-radius:50%; border:none; color:white; cursor:pointer;">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, updateDoc } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "yowasap",
            storageBucket: "yowasap.firebasestorage.app",
            messagingSenderId: "964491262310",
            appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let activeChatUser = null;
        let typingTimeout = null;

        window.loginUser = async () => {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return alert('Nama tidak boleh kosong');

            currentUser = {
                id: name.toLowerCase().replace(/\s+/g, '_'),
                name: name,
                avatar: document.getElementById('my-avatar').src,
                status: 'online',
                typingTo: null
            };

            await setDoc(doc(db, "users", currentUser.id), currentUser);
            document.getElementById('login-screen').style.display = 'none';
            
            if (Notification.permission !== "granted") Notification.requestPermission();

            listenUsers();
        };

        function listenUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const usersList = document.getElementById('users-list');
                usersList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const user = docSnap.data();
                    if (user.id === currentUser.id) return;

                    const userEl = document.createElement('div');
                    userEl.style.display = "flex";
                    userEl.style.alignItems = "center";
                    userEl.style.padding = "12px";
                    userEl.style.borderBottom = "1px solid #eee";
                    userEl.style.cursor = "pointer";
                    userEl.style.gap = "10px";
                    if(activeChatUser?.id === user.id) { userEl.style.backgroundColor = "#e9edef"; }
                    userEl.onclick = () => selectUserChat(user);
                    
                    userEl.innerHTML = `
                        <div style="position:relative;">
                            <img src="${user.avatar}" style="width:48px; height:48px; border-radius:50%; object-fit:cover;">
