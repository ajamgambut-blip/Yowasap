<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Yowasap v2</title>

<meta name="theme-color" content="#075e54">
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { height: 100dvh; }
  .chat-bg {
    background-color: #e5ddd5;
    background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%239C92AC' fill-opacity='0.08'%3E%3Ccircle cx='40' cy='40' r='1'/%3E%3C/g%3E%3C/svg%3E");
  }
</style>
</head>

<body class="flex flex-col bg-[#e5ddd5]">

<!-- HEADER -->
<div class="bg-[#075e54] text-white p-3 flex items-center gap-3 flex-shrink-0">
  <div class="flex-1">
    <h1 class="font-medium">Yowasap v2</h1>
    <p id="roomStatus" class="text-xs opacity-80">Room: -</p>
    <p id="typingStatus" class="text-xs opacity-70 italic hidden">Sedang mengetik...</p>
  </div>
</div>

<!-- SETTING -->
<div class="bg-white px-3 py-2 flex flex-col gap-2 flex-shrink-0">

  <input id="nameInput"
    class="text-sm bg-gray-100 rounded px-2 py-1"
    placeholder="Nama">

  <input id="roomInput"
    class="text-sm bg-gray-100 rounded px-2 py-1 font-mono"
    placeholder="Room">

</div>

<!-- CHAT -->
<div id="chatBox" class="flex-1 overflow-y-auto p-3 chat-bg"></div>

<!-- INPUT -->
<div class="p-2 bg-gray-200 flex gap-2 flex-shrink-0">

  <label class="bg-white p-2 rounded-full">
    📎
    <input id="fileInput" type="file" class="hidden">
  </label>

  <input id="msgInput"
    class="flex-1 px-3 py-2 rounded-full text-sm"
    placeholder="Ketik pesan...">

  <button id="sendBtn"
    class="bg-green-500 text-white px-4 rounded-full">
    ➤
  </button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded, off, set, onValue
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
  getStorage, ref as sRef, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.appspot.com",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

/* ================= USER ================= */
const userId = localStorage.getItem("yowasap_id") || crypto.randomUUID();
localStorage.setItem("yowasap_id", userId);

/* ================= ELEMENT ================= */
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");
const fileInput = document.getElementById("fileInput");
const nameInput = document.getElementById("nameInput");
const roomInput = document.getElementById("roomInput");
const typingStatus = document.getElementById("typingStatus");
const roomStatus = document.getElementById("roomStatus");

/* ================= STATE ================= */
let chatRef, typingRef;
let currentRoom = "";
let typingTimeout;
let chatListener = null;

/* ================= UTIL ================= */
const myName = () => nameInput.value.trim() || "Aku";
const getRoom = () => roomInput.value.trim().replace(/[^a-zA-Z0-9]/g, "") || "default";

const escapeHtml = (str="") =>
  str.replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));

/* ================= MESSAGE ================= */
function addMessage(_, data) {
  const isMe = data.userId === userId;

  let content = "";

  if (data.type === "image") {
    content = `<img src="${data.url}" class="max-w-[200px] rounded-lg">`;
  } else if (data.type === "video") {
    content = `<video src="${data.url}" controls class="max-w-[200px] rounded-lg"></video>`;
  } else {
    content = `<p class="text-sm">${escapeHtml(data.text)}</p>`;
  }

  const div = document.createElement("div");
  div.className = `flex ${isMe ? "justify-end" : "justify-start"} mb-1`;

  div.innerHTML = `
    <div class="max-w-[75%] px-3 py-2 rounded-lg shadow-sm bg-white">
      <p class="text-xs font-bold text-green-700">${data.name}</p>
      ${content}
      <p class="text-[10px] text-gray-400 text-right">${data.time}</p>
    </div>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ================= JOIN ROOM ================= */
function joinRoom() {
  const room = getRoom();
  if (room === currentRoom) return;

  if (chatRef) off(chatRef);

  currentRoom = room;
  roomStatus.innerText = "Room: " + room;

  chatBox.innerHTML = "";

  chatRef = ref(db, `rooms/${room}/chat`);
  typingRef = ref(db, `rooms/${room}/typing/${userId}`);

  chatListener = onChildAdded(chatRef, snap =>
    addMessage(snap.key, snap.val())
  );

  onValue(ref(db, `rooms/${room}/typing`), snap => {
    const data = snap.val() || {};
    const other = Object.keys(data).find(id => id !== userId && data[id]);

    typingStatus.classList.toggle("hidden", !other);
    typingStatus.innerText = other ? "Sedang mengetik..." : "";
  });
}

/* ================= SEND ================= */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !chatRef) return;

  await push(chatRef, {
    name: myName(),
    userId,
    text,
    type: "text",
    time: new Date().toLocaleTimeString("id-ID"),
    timestamp: Date.now()
  });

  msgInput.value = "";
  set(typingRef, false);
}

/* ================= TYPING ================= */
msgInput.addEventListener("input", () => {
  if (!typingRef) return;

  set(typingRef, true);
  clearTimeout(typingTimeout);

  typingTimeout = setTimeout(() => {
    set(typingRef, false);
  }, 1500);
});

/* ================= FILE ================= */
fileInput.addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file || !chatRef) return;

  if (file.size > 5 * 1024 * 1024) {
    alert("Max 5MB");
    return;
  }

  let type = "file";
  if (file.type.startsWith("image")) type = "image";
  else if (file.type.startsWith("video")) type = "video";

  const fileRef = sRef(storage, `rooms/${currentRoom}/${userId}_${Date.now()}`);

  const snap = await uploadBytes(fileRef, file);
  const url = await getDownloadURL(snap.ref);

  await push(chatRef, {
    name: myName(),
    userId,
    type,
    url,
    time: new Date().toLocaleTimeString("id-ID"),
    timestamp: Date.now()
  });

  fileInput.value = "";
});

/* ================= EVENTS ================= */
document.getElementById("sendBtn").onclick = sendMessage;

msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

roomInput.addEventListener("blur", joinRoom);

nameInput.addEventListener("blur", () => {
  localStorage.setItem("yowasap_name", myName());
  joinRoom();
});

/* ================= INIT ================= */
nameInput.value = localStorage.getItem("yowasap_name") || "Anam";
roomInput.value = localStorage.getItem("yowasap_room") || "MenujuHalal";

joinRoom();

</script>
</body>
</html>
