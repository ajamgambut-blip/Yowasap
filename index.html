<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
    authDomain: "yowasap.firebaseapp.com",
    databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "yowasap",
    storageBucket: "yowasap.firebasestorage.app",
    messagingSenderId: "964491262310",
    appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const chatBox = document.getElementById('chatBox');
  const msgInput = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const nameInput = document.getElementById('nameInput');
  const roomInput = document.getElementById('roomInput');
  const roomStatus = document.getElementById('roomStatus');

  let chatRef;
  let currentRoom = '';
  const seenMessages = new Set(); // KUNCI ANTI DOBEL

  function myName() { return nameInput.value.trim() || 'Aku'; }
  function getRoom() { return roomInput.value.trim().replace(/[^a-zA-Z0-9]/g, '') || 'default'; }

  function addMessage(key, data) {
    if(seenMessages.has(key)) return; // UDAH MUNCUL = SKIP
    seenMessages.add(key);

    const isMe = data.name === myName();
    if(chatBox.children.length === 1 && chatBox.children[0].innerText.includes('Masuk ke room')) {
      chatBox.innerHTML = '';
    }

    const div = document.createElement('div');
    div.id = 'msg-' + key; // KASIH ID BIAR NGGAK DOBEL
    div.className = `flex ${isMe? 'justify-end' : 'justify-start'} mb-1`;
    div.innerHTML = `
      <div class="max-w-[75%] px-3 py-2 rounded-lg shadow-sm ${isMe? 'bg-[#dcf8c6] rounded-br-none' : 'bg-white rounded-bl-none'}">
        ${!isMe? `<p class="text-xs font-bold text-[#075e54] mb-0.5">${data.name}</p>` : ''}
        <p class="text-sm text-gray-800 break-words">${data.text}</p>
        <p class="text- text-gray-500 text-right mt-0.5">${data.time}</p>
      </div>
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function joinRoom() {
    const newRoom = getRoom();
    if(newRoom === currentRoom) return;

    if(chatRef) off(chatRef);

    currentRoom = newRoom;
    roomStatus.innerText = 'Room: ' + currentRoom;
    chatBox.innerHTML = `<div class="text-center text-xs text-gray-500 mt-10">Masuk ke room: ${currentRoom}</div>`;
    seenMessages.clear(); // RESET PAS GANTI ROOM

    chatRef = ref(db, 'rooms/' + currentRoom + '/chat');

    onChildAdded(chatRef, (snapshot) => {
      addMessage(snapshot.key, snapshot.val());
    });
  }

  function kirimPesan() {
    const text = msgInput.value.trim();
    if(text === '' ||!chatRef) return;
    push(chatRef, {
      name: myName(),
      text: text,
      time: new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'})
    });
    msgInput.value = '';
  }

  async function mintaIzinMic() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
      stream.getTracks().forEach(track => track.stop()); // MATIIN LAGI ABIS DAPET IZIN
    } catch(e) {
      alert('Izin mic/kamera ditolak. Buka Settings iPhone > Safari > Camera + Microphone > Allow');
    }
  }

  sendBtn.onclick = kirimPesan;
  msgInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') kirimPesan(); });
  roomInput.addEventListener('blur', joinRoom);
  nameInput.addEventListener('blur', () => localStorage.setItem('yowasap_name', myName()));
  roomInput.addEventListener('blur', () => localStorage.setItem('yowasap_room', roomInput.value.trim()));

  nameInput.value = localStorage.getItem('yowasap_name') || 'Anam';
  roomInput.value = localStorage.getItem('yowasap_room') || 'MenujuHalal';

  document.getElementById('btnCall').onclick = async () => {
    await mintaIzinMic(); // MINTA IZIN DULU
    window.location.href = 'https://meet.jit.si/Yowasap-' + getRoom() + '#config.startWithAudioMuted=false';
  }

  joinRoom();
</script>
