<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#e5ddd5;height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:#075e54;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
.header img{width:42px;height:42px;border-radius:50%;object-fit:cover;background:#ccc}
.header-text b{font-size:17px;display:block}
.header-text span{font-size:13px;opacity:0.9}

/* CHAT */
#chatBox{flex:1;overflow-y:auto;padding:20px;background:url('https://i.imgur.com/qLX3X5X.png') repeat;background-size:300px;display:flex;flex-direction:column}

/* MESSAGE + AVATAR */
.msg{display:flex;gap:8px;margin-bottom:12px;align-items:flex-end}
.msg.me{justify-content:flex-end}
.msg.other{justify-content:flex-start}

.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#ddd}

.bubble{
  max-width:70%;
  padding:8px 12px;
  border-radius:8px;
  font-size:15px;
  line-height:1.4;
  box-shadow:0 1px 0.5px rgba(0,0,0,.13);
  word-wrap:break-word
}
.me .bubble{background:#dcf8c6;border-top-right-radius:0}
.other .bubble{background:#fff;border-top-left-radius:0}

.time{font-size:11px;color:#667781;margin-left:6px}

/* INPUT */
.inputBox{display:flex;padding:10px;background:#f0f0f0;gap:8px}
.inputBox input{flex:1;padding:10px 14px;border:none;border-radius:20px;outline:none;font-size:15px}
.inputBox button{background:#075e54;color:#fff;border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;font-size:20px}
</style>
</head>
<body>

<div class="header">
  <img id="headerPhoto" src="https://i.imgur.com/VcRPpDG.png" alt="foto">
  <div class="header-text">
    <b id="headerName">Lina</b>
    <span id="headerStatus">online</span>
  </div>
</div>

<div id="chatBox"></div>

<div class="inputBox">
  <input id="input" placeholder="Ketik pesan..." disabled>
  <button id="sendBtn" onclick="send()" disabled>➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
/* ========== 1. FIREBASE CONFIG - GANTI PUNYA KAMU ========== */
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ========== 2. AUTO DETEKSI USER DARI LINK ========== */
const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user') || 'Anam';
const roomId = urlParams.get('room') || 'default-room';

const myName = user;
const herName = user === 'Anam' ? 'Lina' : 'Anam';

// GANTI LINK INI PAKE FOTO KAMU + LINA DI IMGUR.COM
const myPhoto = user === 'Anam' 
  ? 'https://i.imgur.com/8Km9tLL.png' 
  : 'https://i.imgur.com/VcRPpDG.png';
const herPhoto = user === 'Anam' 
  ? 'https://i.imgur.com/VcRPpDG.png' 
  : 'https://i.imgur.com/8Km9tLL.png';

// SET HEADER
document.getElementById('headerName').textContent = herName;
document.getElementById('headerPhoto').src = herPhoto;

let myId = null;
const chatRef = db.ref("chats/"+roomId+"/messages");
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

/* ========== 3. LOGIN ========== */
firebase.auth().signInAnonymously()
.then(u => {
  myId = u.user.uid;
  input.disabled = false;
  sendBtn.disabled = false;
  initChat();
})
.catch(e => {
  alert("Aktifin Anonymous Login di Firebase Console > Authentication > Sign-in method");
});

/* ========== 4. KIRIM PESAN ========== */
function send(){
  let text = input.value.trim();
  if(!text || !myId) return;

  chatRef.push({
    text,
    senderId: myId,
    name: myName,
    time: Date.now()
  });
  input.value = "";
}

input.addEventListener('keypress', e => {
  if(e.key === 'Enter') send();
});

/* ========== 5. TAMPILIN PESAN + AVATAR ========== */
function render(msg){
  const div = document.createElement("div");
  div.className = "msg " + (msg.senderId === myId ? "me" : "other");

  let t = new Date(msg.time).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  
  // Avatar dia di kiri, avatar kamu di kanan
  let avatarUrl = msg.senderId === myId ? myPhoto : herPhoto;

  div.innerHTML = `
    ${msg.senderId !== myId ? `<img class="avatar" src="${herPhoto}">` : ''}
    <div class="bubble">
      ${msg.text}
      <span class="time">${t}</span>
    </div>
    ${msg.senderId === myId ? `<img class="avatar" src="${myPhoto}">` : ''}
  `;
  
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function initChat(){
  chatRef.on("child_added", snap => {
    render(snap.val());
  });
}
</script>
</body>
</html>
