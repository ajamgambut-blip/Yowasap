<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TES DULU</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex-col h-screen">

  <div class="bg-green-600 text-white p-4">
    <h1 class="text-xl font-bold">TES TOMBOL</h1>
  </div>

  <div id="chatBox" class="flex-1 p-4 overflow-y-auto bg-white">
    <div class="text-center text-gray-400">Klik Kirim buat ngetes</div>
  </div>

  <div class="p-3 bg-white flex gap-2 border-t">
    <input id="pesanInput" type="text" placeholder="Ketik apa aja..." 
      class="flex-1 border rounded-full px-4 py-2">
    <button id="btnKirim" class="bg-green-600 text-white rounded-full px-5 py-2 font-bold">
      Kirim
    </button>
  </div>

  <script>
    alert('JS HIDUP!')
    
    document.getElementById('btnKirim').onclick = function() {
      const text = document.getElementById('pesanInput').value
      alert('Kamu ngetik: ' + text)
      document.getElementById('chatBox').innerHTML += `<div class="bg-green-500 text-white p-2 rounded mt-2">${text}</div>`
      document.getElementById('pesanInput').value = ''
    }
  </script>
</body>
</html>
