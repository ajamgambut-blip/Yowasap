<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #e5ddd5; }

  /* HEADER IJO + FOTO COUPLE */
 .header {
    background: #128C7E;
    color: white;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
  }
 .header img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid white;
  }
 .header h1 { font-size: 18px; }

  /* CHAT AREA */
 .chat {
    padding: 10px;
    height: calc(100vh - 120px);
    overflow-y: auto;
  }
 .bubble {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin: 8px 0;
    max-width: 70%;
  }
 .bubble.me { margin-left: auto; flex-direction: row-reverse; }
 .bubble img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
  }
 .bubble.text {
    background: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
  }
 .bubble.me.text { background: #DCF8C6; }

  /* INPUT */
 .input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    padding: 8px;
    background: #f0f0f0;
    gap: 6px;
  }
 .input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
  }
 .input-area button {
    background: #128C7E;
    color: white;
    border: none;
    padding: 0 16px;
    border-radius: 50%;
    font-size: 18px;
  }
</style>
</head>
<body>

<!-- HEADER: FOTO COUPLE OTOMATIS -->
<div class="header">
  <img id="headerAvatar" src="avatars/foto-grup.png" alt="avatar">
  <h1>Yowasap</h1>
</div>

<!-- CHAT CONTOH -->
<div class="chat" id="chat">
  <div class="bubble">
    <img class="chatAvatar" src="">
    <div class="text">Halo sayang 😊</div>
  </div>
  <div class="bubble me">
    <img class="chatAvatar" src="">
    <div class="text">Iya kamu lagi ngapain?</div>
  </div>
</div>

<!-- INPUT CHAT -->
<div class="input-area">
  <input type="text" id="inputText" placeholder="Ketik pesan...">
  <button onclick="kirim()">➤</button>
</div>

<script>
// ===== SETTING AVATAR =====
const AVATAR_MAP = {
  "Anam": "avatars/foto-1.png", // foto kamu
  "Lina": "avatars/foto-2.png", // foto Lina
  "default": "avatars/foto-grup.png" // foto couple header
};

// Ambil nama dari localStorage, kalo belum ada suruh input
let nama = localStorage.getItem('nama');
if(!nama) {
  nama = prompt("Masukin nama kamu: Anam atau Lina");
  localStorage.setItem('nama', nama);
}

// Pasang avatar header + avatar bubble sesuai nama
function pasangAvatar() {
  document.getElementById('headerAvatar').src = AVATAR_MAP.default;

  document.querySelectorAll('.chatAvatar').forEach(img => {
    // Kalo bubble punya class "me" = kamu, selain itu = dia
    let bubble = img.closest('.bubble');
    if(bubble.classList.contains('me')) {
      img.src = AVATAR_MAP[nama] || AVATAR_MAP.default;
    } else {
      let namaLawan = nama === "Anam"? "Lina" : "Anam";
      img.src = AVATAR_MAP[namaLawan] || AVATAR_MAP.default;
    }
  });
}

// Kirim chat baru
function kirim() {
  let text = document.getElementById('inputText').value;
  if(text.trim() === "") return;

  let chat = document.getElementById('chat');
  let bubble = document.createElement('div');
  bubble.className = 'bubble me';
  bubble.innerHTML = `
    <img class="chatAvatar" src="${AVATAR_MAP[nama]}">
    <div class="text">${text}</div>
  `;
  chat.appendChild(bubble);
  document.getElementById('inputText').value = '';
  chat.scrollTop = chat.scrollHeight;
}

// Jalanin pas halaman load
pasangAvatar();

// Enter buat kirim
document.getElementById('inputText').addEventListener('keypress', e => {
  if(e.key === 'Enter') kirim();
});
</script>

</body>
</html>
