<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yowasap</title>
    <!-- TEMPEL INI DOANG = KODE PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a884">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 1. Tailwind CSS - PAKAI CDN YANG BENER -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. FontAwesome - PAKAI CDN YANG BENER -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        const manifest = {
            "name": "Yowasap Messenger",
            "short_name": "Yowasap",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0b141a",
            "theme_color": "#00a884",
            "icons": [
                {
                    "src": "https://flaticon.com",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
    </script>

    <style>
        /* Background Halus Khas WhatsApp */
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://githubusercontent.com');
            background-repeat: repeat;
            background-blend-mode: overlay;
            opacity: 0.95;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">

<!-- Overlay -->
<div id="overlay"
class="hidden fixed inset-0 bg-black/40 z-40"
onclick="toggleSidebar()"></div>

<!-- Screen Login -->
<div id="login-screen" class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center absolute inset-0 m-auto h-fit">
    <h1 class="text-3xl font-bold text-emerald-600 mb-6">
        <i class="fab fa-whatsapp mr-2"></i>Yowasap
    </h1>

    <p class="text-gray-500 mb-4 text-sm">
        Masuk sebagai salah satu user
    </p>

    <div class="space-y-3">
        <button onclick="loginAs('User1','Anam')"
            class="w-full bg-emerald-600 text-white py-2 rounded-lg">
            Masuk sebagai Anam
        </button>

        <button onclick="loginAs('User2','Lina')"
            class="w-full bg-blue-600 text-white py-2 rounded-lg">
            Masuk sebagai Lina
        </button>
    </div>
</div>

<!-- MAIN -->
<div id="main-screen" class="hidden w-full h-[100dvh] bg-slate-100 flex overflow-hidden relative">

    <!-- SIDEBAR DRAWER -->
    <div id="sidebar"
    class="fixed top-0 left-0 h-full w-72 bg-white shadow-2xl
    z-50 transform -translate-x-full transition-transform duration-300
    flex flex-col">

        <!-- Profil -->
        <div class="bg-emerald-600 text-white p-5">

            <div class="flex items-center justify-between">

                <div class="flex items-center gap-3">

                    <div class="relative group">

                        <img id="my-avatar"
                        src="https://placehold.co/100"
                        class="w-12 h-12 rounded-full object-cover border">

                        <label class="absolute inset-0 bg-black/40 rounded-full
                        flex items-center justify-center opacity-0
                        group-hover:opacity-100 cursor-pointer">

                            <i class="fas fa-camera"></i>

                            <input
                            id="upload-avatar"
                            type="file"
                            accept="image/*"
                            onchange="changeAvatar(this)"
                            class="hidden">

                        </label>

                    </div>

                    <div>

                        <h2 id="my-name"
                        class="font-semibold">
                            Nama
                        </h2>

                        <p class="text-xs">
                            Online
                        </p>

                    </div>

                </div>

                <button onclick="toggleSidebar()">
                    <i class="fas fa-times text-xl"></i>
                </button>

            </div>

        </div>

        <!-- Daftar Chat -->
        <div class="flex-1 overflow-y-auto">

            <div id="target-user-item"
            onclick="selectTargetChat();toggleSidebar();"
            class="flex items-center gap-3 p-4 hover:bg-gray-100 cursor-pointer">

                <img id="target-avatar"
                src="https://placehold.co/100"
                class="w-12 h-12 rounded-full">

                <div class="flex-1">

                    <h3 id="target-name"
                    class="font-semibold">
                        Lina
                    </h3>

                    <p id="target-status-badge"
                    class="text-xs text-green-600">
                        Offline
                    </p>

                </div>

            </div>

        </div>

        <button onclick="logout()"
        class="m-4 bg-red-500 text-white rounded-lg py-2">
            Logout
        </button>

    </div>

    <!-- CHAT -->
    <div class="flex-1 flex flex-col">

        <!-- HEADER -->
        <div class="bg-gray-100 border-b p-3 flex items-center justify-between">

            <div class="flex items-center gap-3">

                <button onclick="toggleSidebar()"
                class="text-2xl text-gray-600">

                    <i class="fas fa-bars"></i>

                </button>

                <img id="chat-header-avatar"
                src="https://placehold.co/100"
                class="w-10 h-10 rounded-full">

                <div>

                    <h3 id="chat-header-name"
                    class="font-semibold">
                        Lina
                    </h3>

                    <p id="chat-header-status"
                    class="text-xs text-gray-500">
                        Offline
                    </p>

                </div>

            </div>

            <button onclick="startVideoCall()"
            class="text-emerald-600 text-xl">

                <i class="fas fa-video"></i>

            </button>

        </div>

        <!-- CHAT -->
        <div id="chat-box"
        class="flex-1 overflow-y-auto p-4 chat-bg space-y-3">

        </div>

        <!-- Typing -->
        <div id="typing-indicator"
        class="hidden px-4 py-1 text-xs italic text-gray-500">
            Sedang mengetik...
        </div>

        <!-- INPUT -->
        <div class="bg-gray-100 border-t p-3 flex gap-2">

            <input
            id="message-input"
            type="text"
            oninput="handleTyping()"
            placeholder="Ketik pesan..."
            class="flex-1 border rounded-full px-4 py-2">

            <button
            onclick="sendMessage()"
            class="bg-emerald-600 text-white w-11 h-11 rounded-full">

                <i class="fas fa-paper-plane"></i>

            </button>

        </div>

    </div>

</div>

    <!-- Firebase App dan Database SDK Modul Esensial -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Firebase milik kamu
        const firebaseConfig = {
    apiKey: null, // <-- INI KUNCI NYA. TANPA TANDA KUTIP
    authDomain: "yowasap.firebaseapp.com",
    databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "yowasap",
    storageBucket: "yowasap.firebasestorage.app",
    messagingSenderId: "964491262310",
    appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variabel Global Aplikasi
        let currentUser = null;
        let currentName = null;
        let targetUser = null;
        let typingTimeout = null;

        // Minta Izin Notifikasi Sistem
        if ("Notification" in window) {
            Notification.requestPermission();
        }

        // Fungsi Login User
        window.loginAs = function(userId, userName) {
            currentUser = userId;
            currentName = userName;
            targetUser = userId === "User1" ? "User2" : "User1";

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');

            // Set Data Profil di Elemen HTML
            document.getElementById('my-name').innerText = currentName;
            document.getElementById('chat-header-name').innerText = targetUser === "User1" ? "Anam" : "Lina";
            document.getElementById('target-name').innerText = targetUser === "User1" ? "Anam" : "Lina";

            // Pasang status online kita ke Firebase
            const myStatusRef = ref(db, 'users/' + currentUser);
            set(myStatusRef, {
                name: currentName,
                status: "online",
                avatar: "https://dicebear.com" + userName
            });

            // Otomatis ubah status menjadi offline jika tab/browser ditutup
            onDisconnect(myStatusRef).update({ status: "offline" });

            // Dengarkan perubahan profil dan status user lawan
            listenTargetUser();
            // Jalankan sinkronisasi pesan secara real-time
            listenMessages();
        }
                // Fungsi Kirim Pesan
        window.sendMessage = function() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text === '' ||!currentUser) return;

            const chatId = [currentUser, targetUser].sort().join('_'); // biar room nya sama
            const messagesRef = ref(db, 'messages/' + chatId);
            push(messagesRef, {
                sender: currentUser,
                name: currentName,
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
            set(ref(db, 'typing/' + chatId + '/' + currentUser), false); // stop typing
        }

        // Enter = Kirim
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Fungsi Dengarkan Pesan Real-time
        window.listenMessages = function() {
            const chatId = [currentUser, targetUser].sort().join('_');
            const messagesRef = ref(db, 'messages/' + chatId);
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; // kosongin dulu

            onValue(messagesRef, (snapshot) => {
                chatBox.innerHTML = '';
                snapshot.forEach((child) => {
                    const msg = child.val();
                    const isMe = msg.sender === currentUser;
                    const bubble = document.createElement('div');
                    bubble.className = `flex ${isMe? 'justify-end' : 'justify-start'}`;
                    bubble.innerHTML = `
    <div class="max-w-xs p-3 pb-1 rounded-2xl shadow flex-col ${isMe? 'bg-emerald-500 text-white rounded-br-none' : 'bg-white text-gray-800 rounded-bl-none'}">
        <p class="text-sm">${msg.text}</p>
        <span class="self-end text- opacity-70 mt-0.5">
            ${new Date(msg.timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}
        </span>
    </div>
`;
                    chatBox.appendChild(bubble);
                });
                chatBox.scrollTop = chatBox.scrollHeight; // auto scroll bawah
            });
        }

        // Fungsi Cek Status & Typing Lawan
        window.listenTargetUser = function() {
            const targetRef = ref(db, 'users/' + targetUser);
            onValue(targetRef, (snapshot) => {
                const data = snapshot.val();
                const status = data? data.status : 'offline';
                document.getElementById('target-status-badge').innerText = status === 'online'? 'Online' : 'Offline';
                document.getElementById('chat-header-status').innerText = status === 'online'? 'Online' : 'Offline';
            });

            const chatId = [currentUser, targetUser].sort().join('_');
            const typingRef = ref(db, 'typing/' + chatId + '/' + targetUser);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                document.getElementById('typing-indicator').classList.toggle('hidden',!isTyping);
            });
        }

        // Fungsi Indikator Mengetik
        window.handleTyping = function() {
            if (!currentUser) return;
            const chatId = [currentUser, targetUser].sort().join('_');
            const typingRef = ref(db, 'typing/' + chatId + '/' + currentUser);
            set(typingRef, true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => set(typingRef, false), 2000); // 2 detik ga ngetik = mati
        }

        // Fungsi Video Call Jitsi
        window.startVideoCall = function() {
            if (!currentUser ||!targetUser) return;
            const roomName = 'Yowasap_' + [currentUser, targetUser].sort().join('_'); // nama room unik
            const jitsiUrl = `https://meet.jit.si/${roomName}`;
            window.open(jitsiUrl, '_blank'); // buka di tab baru
        }

        // Fungsi Logout
        window.logout = function() {
            if (currentUser) {
                set(ref(db, 'users/' + currentUser + '/status'), 'offline');
            }
            location.reload(); // balik ke login
        }

        // Fungsi Ganti Avatar - versi simpel
        window.changeAvatar = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('my-avatar').src = e.target.result;
                    if(currentUser) set(ref(db, 'users/' + currentUser + '/avatar'), e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    window.toggleSidebar = function () {

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");

}       
    </script>
</body>
</html>
