<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WA KW Kita</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex-col">

  <div class="bg-green-600 text-white p-4 shadow shrink-0">
    <h1 class="text-xl font-bold">Chat Pribadi</h1>
  </div>

  <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-3 bg-gray-50">
    <div class="text-center text-gray-400 text-sm">Loading chat...</div>
  </div>

  <div class="p-3 bg-white flex gap-2 border-t shrink-0">
    <input id="pesanInput" type="text" placeholder="Ketik pesan..." 
      class="flex-1 border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
    <button id="btnKirim" class="bg-green-600 text-white rounded-full px-5 py-2 font-bold">
      Kirim
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    alert('1. Script kebaca!') 
    
    const SUPABASE_URL = 'https://kdxqnlsbmpvnfokpr.supabase.co'
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkeHFubHFsc2JtcHZuZm9rcnByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTEyMTAsImV4cCI6MjA5Nzc4NzIxMH0.oR1FPVubwV3P_tY26tLICuoB8JZhRlsAYpyhkDPpiuM'
    
    try {
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
      alert('2. Supabase nyambung!')
      
      async function loadPesan() {
        alert('3. Mau ngambil data...')
        const { data, error } = await supabase.from('pesan').select('*').order('dibuat_pada', { ascending: true })
        
        if(error) { 
          alert('ERROR LOAD: ' + error.message)
          return 
        }
        
        alert('4. Data ketemu: ' + data.length + ' pesan')
        const chatBox = document.getElementById('chatBox')
        chatBox.innerHTML = ''
        
        data.forEach(p => {
          const bubble = document.createElement('div')
          bubble.className = 'flex justify-end'
          bubble.innerHTML = `<div class="bg-green-500 text-white px-4 py-2 rounded-2xl rounded-br-none max-w-[70%] shadow">${p.isi}</div>`
          chatBox.appendChild(bubble)
        })
      }
      
      async function kirimPesan() {
        const input = document.getElementById('pesanInput')
        const text = input.value.trim()
        if(text === '') return
        
        alert('5. Mau kirim ke Supabase...')
        const { error } = await supabase.from('pesan').insert([{ pengirim: 'Aku', isi: text }])
        
        if(error) {
          alert('ERROR KIRIM: ' + error.message)
        } else {
          alert('6. Terkirim! Refresh...')
          input.value = ''
          loadPesan()
        }
      }
      
      document.getElementById('btnKirim').addEventListener('click', kirimPesan)
      loadPesan()
      
    } catch(e) {
      alert('ERROR FATAL: ' + e.message)
    }
  </script>
</body>
</html>
