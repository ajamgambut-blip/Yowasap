<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap - Anam & Lina</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { background: #0b141a; color: #e9edef; display: flex; flex-direction: column; height: 100vh; }
header { background: #202c33; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a3942; }
header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
header .info h3 { font-size: 16px; }
header .info p { font-size: 12px; color: #8696a0; }
.chat { flex: 1; padding: 16px; overflow-y: auto; background: #0b141a; display: flex; flex-direction: column; gap: 8px; }
.bubble { max-width: 75%; padding: 8px 12px; border-radius: 8px; position: relative; word-wrap: break-word; font-size: 14px; line-height: 1.4; }
.me { background: #005c4b; align-self: flex-end; border-bottom-right-radius: 2px; }
.her { background: #202c33; align-self: flex-start; border-bottom-left-radius: 2px; }
.time { font-size: 10px; color: #8696a0; margin-left: 6px; float: right; }
.input-area { display: flex; padding: 10px; background: #202c33; gap: 8px; }
.input-area input { flex: 1; padding: 10px 14px; border-radius: 20px; border: none; outline: none; background: #2a3942; color: #e9edef; font-size: 14px; }
.input-area button { background: #00a884; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; color: white; font-size: 18px; }
.error-box { background: #ff4444; color: white; padding: 10px; text-align: center; font-size: 13px; display: none; }
</style>
</head>
<body>
<header>
  <img id="herPhoto" src="" alt="foto">
  <div class="info">
    <h3 id="herName">Lina</h3>
    <p>Online</p>
  </div>
</header>

<div class="error-box" id="errorBox"></div>
<div class="chat" id="chat"></div>

<div class="input-area">
  <input type="text" id="msgInput" placeholder="Ketik pesan...">
  <button id="sendBtn">➤</button>
</div>

  authDomain: "yowasap.firebaseapp.com",

document.getElementById('herName').textContent = herName;
document.getElementById('herPhoto').src = herPhoto;

const chat = document.getElementById('chat');
const input = document.getElementById('msgInput');
const btn = document.getElementById('sendBtn');
const errorBox = document.getElementById('errorBox');

function showError(msg) {
  errorBox.textContent = '⚠️ ' + msg;
  errorBox.style.display = 'block';
  input.disabled = true;
  btn.disabled = true;
}

signInAnonymously(auth).then(() => {
  console.log("Login OK sebagai:", myName);
  input.disabled = false; // HAPUS DISABLE
  btn.disabled = false;
}).catch((e) => {
  showError("Firebase diblokir: " + e.message + ". Cek Anonymous Login udah Enabled?");
  console.error(e);
});

db.ref('rooms/' + roomId + '/messages').on('child_added', snap => {
  const data = snap.val();
  if(!data) return;
  
  const div = document.createElement('div');
  // INI KUNCINYA: kalo data.user sama kayak user di URL = kanan ijo
  // kalo beda = kiri abu2
  div.className = 'bubble ' + (data.user === user ? 'me' : 'her');
  
  div.innerHTML = data.text + `<span class="time">${data.time}</span>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});

function sendMsg() {

btn.onclick = sendMsg;
input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
</script>
</body>
</html>
