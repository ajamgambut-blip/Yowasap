const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function kirimPesan() {
  alert('3. Tombol kepencet!') // Kalo ini nggak muncul = tombol rusak
  const input = document.getElementById('pesanInput')
  const text = input.value.trim()
  alert('4. Isi: ' + text) // Kalo kosong = input nggak kebaca
  
  if(text === '') return

  alert('5. Mau kirim ke Supabase...')
  const { data, error } = await supabase
    .from('pesan')
    .insert([{ pengirim: 'Aku', isi: text }])

  if(error) {
    alert('6. ERROR NYA INI: ' + error.message) // INI KUNCI JAWABANNYA
  } else {
    alert('7. SUKSES KIRIM!')
    input.value = ''
    loadPesan()
  }
}

async function loadPesan() {
  const { data, error } = await supabase.from('pesan').select('*').order('dibuat_pada', { ascending: true })
  if(error) { alert('Error load: ' + error.message); return }
  
  const chatBox = document.getElementById('chatBox')
  chatBox.innerHTML = '<div class="text-center text-gray-400 text-sm">Selamat datang sayang 💚</div>'
  data.forEach(p => {
    const bubble = document.createElement('div')
    bubble.className = 'flex justify-end'
    bubble.innerHTML = `<div class="bg-green-500 text-white px-4 py-2 rounded-2xl rounded-br-none max-w-[70%] shadow">${p.isi}</div>`
    chatBox.appendChild(bubble)
  })
}

document.getElementById('btnKirim').addEventListener('click', kirimPesan)
loadPesan()
</script>
