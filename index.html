<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yowasap</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075E54">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yowasap">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #ece5dd;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #075E54;
  color: white;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  height: 56px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 2;
}
.header-left img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}
.header-left .name b { font-size: 17px; }
.header-left .name span { font-size: 12px; opacity: 0.9; }

.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}
.header-center img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid white;
}

.header-icons {
  display: flex;
  gap: 20px;
  font-size: 22px;
  z-index: 2;
}
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 10px;
  background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
  background-size: cover;
}
.msg {
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  margin: 5px 0;
  max-width: 75%;
  box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  position: relative;
  word-wrap: break-word;
}
.msg.me {
  background: #dcf8c6;
  margin-left: auto;
}
.time {
  font-size: 11px;
  color: #667781;
  margin-left: 8px;
  float: right;
}
.input-area {
  display: flex;
  padding: 8px;
  background: #f0f0f0;
  gap: 8px;
}
.input-area input {
  flex: 1;
  border: none;
  border-radius: 20px;
  padding: 10px 16px;
  outline: none;
  font-size: 15px;
}
.input-area button {
  background: #075E54;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  color: white;
  font-size: 20px;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- HEADER FIX -->
<div class="header">
  <div class="header-left">
    <img src="avatars/foto-1.png" alt="Anam"> <!-- KAMU -->
    <div class="name">
      <b>Lina</b>
      <span>online</span>
    </div>
  </div>
  
  <div class="header-center">
    <img src="avatars/foto-grup.png" alt="Grup"> <!-- FOTO COUPLE -->
  </div>
  
  <div class="header-icons">
    <span>📹</span>
    <span>⋮</span>
  </div>
</div>

<div class="chat" id="chatBox"></div>

<div class="input-area">
  <input id="input" placeholder="Ketik pesan..." autocomplete="off">
  <button onclick="sendMessage()">➤</button>
</div>

<script>
let messages = JSON.parse(localStorage.getItem('yowasap-chat')) || [];
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('input');

function renderMessages() {
  chatBox.innerHTML = '';
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = msg.isMe ? 'msg me' : 'msg';
    div.innerHTML = msg.text + `<span class="time">${msg.time}</span>`;
    chatBox.appendChild(div);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
  if(input.value.trim() === '') return;
  messages.push({
    text: input.value,
    isMe: true,
    time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
  });
  localStorage.setItem('yowasap-chat', JSON.stringify(messages));
  renderMessages();
  input.value = '';
}

input.addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMessage();
});

renderMessages();

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
