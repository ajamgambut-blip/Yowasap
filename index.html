<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI }
body { background:#0b141a; color:#e9edef; display:flex; flex-direction:column; height:100vh }
header { background:#202c33; padding:12px 16px; display:flex; align-items:center; gap:12px }
header img { width:40px; height:40px; border-radius:50% }
.chat { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:8px }
.bubble { max-width:75%; padding:8px 12px; border-radius:8px; font-size:14px; position:relative; word-wrap:break-word }
.me { background:#005c4b; align-self:flex-end } /* kamu ijo kanan */
.her { background:#202c33; align-self:flex-start } /* dia abu kiri */
.time { font-size:10px; color:#8696a0; margin-left:6px }
.input-area { display:flex; padding:10px; background:#202c33; gap:8px }
.input-area input { flex:1; padding:10px 14px; border-radius:20px; border:none; background:#2a3942; color:#e9edef; outline:none }
.input-area button { background:#00a884; border:none; border-radius:50%; width:44px; height:44px; color:white; font-size:18px; cursor:pointer }
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>
<body>
<header>
  <img id="herPhoto" src="">
  <div><h3 id="herName">Lina</h3><p>Online</p></div>
  <button id="callBtn" style="margin-left:auto; background:#00a884; border:none; border-radius:50%; width:40px; height:40px; font-size:20px; cursor:pointer">📞</button>
</header>
<div class="chat" id="chat"></div>
<div class="input-area">
  <input type="text" id="msgInput" placeholder="Ketik pesan...">
  <button id="sendBtn">➤</button>
</div>

<script>
// TEMPEL CONFIG KAMU DISINI
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

firebase.initializeApp(firebaseConfig);
// 1. Ambil user dari URL ?user=anam atau ?user=lina
const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user') || 'anam';

// 2. Room ID biar chat kalian nyambung
const roomId = 'pacar-lina-anam';

// 3. Nama + Foto - UDAH AKU ISI
const herName = user === 'anam' ? 'Lina' : 'Anam';
const herPhoto = user === 'anam' 
  ? 'https://i.imgur.com/BgaNlVM.jpeg'  // Foto Lina buat Anam
  : 'https://i.imgur.com/wfPOwQN.jpeg'; // Foto Anam buat Lina

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const btn = document.getElementById('sendBtn');

// 4. Isi ke header atas
document.getElementById('herName').textContent = herName;
document.getElementById('herPhoto').src = herPhoto;

// 1. Login anonim dulu, nunggu berhasil baru jalanin chat + notif
auth.signInAnonymously().then(() => {

  // 2. Listener buat nampilin chat kiri-kanan
  db.ref('rooms/' + roomId + '/messages').on('child_added', snap => {
    const data = snap.val();
    if(!data) return;
    const div = document.createElement('div');
    div.className = 'bubble ' + (data.user === user ? 'me' : 'her');
    div.innerHTML = data.text + `<span class="time">${data.time}</span>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  });

  // 3. Minta izin notifikasi pas pertama buka
  if ('Notification' in window && Notification.permission !== 'granted') {
    Notification.requestPermission();
  }

  // 4. Listener buat notif kalo tab lagi ketutup
  db.ref('rooms/' + roomId + '/messages').on('child_added', snap => {
    const data = snap.val();
    if(!data || data.user === user) return;
    
    if (document.hidden && Notification.permission === 'granted') {
      new Notification(herName + ' kirim pesan', {
        body: data.text,
        icon: herPhoto
      });
    }
  });

}); // 👈 TUTUP .then() SAMPE SINI AJA

// 5. Function kirim pesan - taro di luar .then
function sendMsg() {
  const text = input.value.trim();
  if(!text) return;
  const time = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
  db.ref('rooms/' + roomId + '/messages').push({user, text, time});
  input.value = '';
}

// 6. Tombol VC - taro paling bawah
document.getElementById('callBtn').onclick = () => {
  const jitsiRoom = 'Yowasap-' + roomId + '-' + user;
  window.open('https://meet.jit.si/' + jitsiRoom, '_blank');
}

// 7. Event tombol kirim + enter
btn.onclick = sendMsg;
input.addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
</script>
</body>
</html>
