<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Yowasap</title>
  <meta name="theme-color" content="#075e54">
  <link rel="manifest" href="./manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
  font-family: 'Roboto', sans-serif;
}

.chat-bg {
  background-color: #e5ddd5;
  background-image: url("https://user-images.githubusercontent.com/150825/134145911-11a4d5eb-2931-4430-bc51-4d658f7d17a0.png");
  background-repeat: repeat;
}
  
   .bubble { animation: slideUp 0.15s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    input[type="file"] { display: none; }
   .text-2xs { font-size: 10px; line-height: 1; }
  </style>
</head>
<body class="h-screen flex flex-col bg-[#e5ddd5]">

  <!-- HEADER -->
  <div class="bg-[#075e54] text-white p-3 flex items-center gap-3 shadow-md flex-shrink-0">
    <div id="myAvatar" class="w-10 h-10 bg-[#128c7e] rounded-full flex items-center justify-center font-bold text-lg cursor-pointer">Y</div>
    <div class="flex-1">
      <h1 class="font-medium text-base">Yowasap</h1>
      <p id="status" class="text-xs opacity-80">online</p>
    </div>
  </div>

  <!-- SETTING PROFIL -->
  <div class="bg-white/95 backdrop-blur px-3 py-2 text-xs flex items-center gap-2 border-b border-gray-200 flex-shrink-0">
    <span class="text-gray-600">Nama</span>
    <input id="namaInput" value="Aku" maxlength="12" class="bg-gray-100 border-none rounded-full px-3 py-1.5 w-24 text-sm focus:outline-none focus:ring-2 focus:ring-[#25d366]">
    <label class="ml-auto bg-gray-100 rounded-full px-3 py-1.5 cursor-pointer hover:bg-gray-200">
      Ganti Foto
      <input type="file" id="fotoInput" accept="image/*">
    </label>
  </div>

  <!-- CHAT AREA - INI KUNCINYA BIAR BISA SCROLL -->
  <div id="chatBox" class="flex-1 overflow-y-auto p-3 space-y-0.5 chat-bg"></div>

  <!-- INPUT BAWAH -->
  <div class="p-2 bg-[#f0f0f0] flex items-end gap-2 flex-shrink-0">
    <label class="bg-white rounded-full w-11 h-11 flex items-center justify-center shadow-sm cursor-pointer hover:bg-gray-50 flex-shrink-0">
      <input type="file" id="imgInput" accept="image/*">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
    </label>
    <input id="pesanInput" type="text" placeholder="Ketik pesan" class="flex-1 bg-white rounded-full px-4 py-2.5 text-sm focus:outline-none shadow-sm">
    <button id="btnKirim" class="bg-[#25d366] hover:bg-[#22c55e] active:bg-[#1da851] text-white rounded-full w-11 h-11 flex items-center justify-center shadow-md transition flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 ml-0.5"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getDatabase, ref, push, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js'

    const firebaseConfig = {
      apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
      authDomain: "yowasap.firebaseapp.com",
      databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "yowasap",
      storageBucket: "yowasap.firebasestorage.app",
      messagingSenderId: "964491262310",
      appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
    }

    const app = initializeApp(firebaseConfig)
    const db = getDatabase(app)
    const roomId = "AYANG2026LOVE"
const pesanRef = ref(db, `rooms/${roomId}/pesan`)
    const kode = prompt("Masukkan kode pasangan")

if (kode !== "AYANG2026LOVE") {
  document.body.innerHTML = "Akses ditolak"
}

    const namaInput = document.getElementById('namaInput')
    const myName = () => namaInput.value.trim() || 'Aku'
    let myPhoto = localStorage.getItem('yowasap_photo') || null

    function setAvatar(url) {
      const av = document.getElementById('myAvatar')
      av.innerHTML = url? `<img src="${url}" class="w-full h-full rounded-full object-cover">` : myName().charAt(0).toUpperCase()
    }
    setAvatar(myPhoto)

    document.getElementById('fotoInput').onchange = e => {
      const file = e.target.files[0]
      if(!file) return
      const reader = new FileReader()
      reader.onload = () => {
        myPhoto = reader.result
        localStorage.setItem('yowasap_photo', myPhoto)
        setAvatar(myPhoto)
      }
      reader.readAsDataURL(file)
    }

    const status = document.getElementById('status')
    status.textContent = 'online'
    window.addEventListener('blur', () => status.textContent = 'terakhir dilihat barusan')
    window.addEventListener('focus', () => status.textContent = 'online')

    let lastDate = ''
    const chatBox = document.getElementById('chatBox')

    onValue(pesanRef, (snapshot) => {
      chatBox.innerHTML = ''
      const data = snapshot.val()
      lastDate = ''

      if(!data) {
        chatBox.innerHTML = `<div class="text-center text-gray-500 text-xs mt-16 bg-white/90 rounded-full px-4 py-2 w-fit mx-auto shadow-sm">🔒 Pesan dan panggilan terenkripsi end-to-end</div>`
        return
      }

      Object.values(data).forEach(p => {
        const msgDate = new Date(p.waktu).toLocaleDateString('id-ID', {day: 'numeric', month: 'long'})
        if(msgDate!== lastDate) {
          lastDate = msgDate
          const today = new Date().toLocaleDateString('id-ID', {day: 'numeric', month: 'long'})
          const divider = document.createElement('div')
          divider.className = 'flex justify-center my-4'
          divider.innerHTML = `<span class="bg-[#e1f3fb] text-gray-600 text-xs px-3 py-1 rounded-full shadow-sm">${msgDate === today? 'HARI INI' : msgDate.toUpperCase()}</span>`
          chatBox.appendChild(divider)
        }

        const isMe = p.pengirim === myName()
        const bubble = document.createElement('div')
        bubble.className = `flex ${isMe? 'justify-end' : 'justify-start'} bubble mb-1`

        const checkmarks = isMe?
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 11" width="16" height="11" class="inline ml-1"><path fill="#53bdeb" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0.036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0.006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>` : ''

        const imgContent = p.gambar? `<img src="${p.gambar}" class="rounded-lg max-w-[220px] mb-1 cursor-pointer" onclick="window.open(this.src)">` : ''

        bubble.innerHTML = `
          <div class="max-w-[78%]">
            ${!isMe? `<div class="text-xs text-[#128c7e] font-medium mb-0.5 ml-2">${p.pengirim}</div>` : ''}
            <div class="${isMe? 'bg-[#dcf8c6] rounded-2xl rounded-tr-sm' : 'bg-white rounded-2xl rounded-tl-sm shadow-sm'} px-3 py-2">
              ${imgContent}
              ${p.isi? `<div class="text-sm text-gray-800 whitespace-pre-wrap break-words">${p.isi}</div>` : ''}
              <div class="text-2xs text-gray-500 text-right mt-1 flex items-center justify-end gap-1">
                ${new Date(p.waktu).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}
                ${checkmarks}
              </div>
            </div>
          </div>`
        chatBox.appendChild(bubble)
      })
      setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 50)
    })

    async function kirimPesan(gambar = null) {
      const input = document.getElementById('pesanInput')
      const text = input.value.trim()
      if(text === '' &&!gambar) return

      await push(pesanRef, {
        pengirim: myName(),
        isi: text,
        gambar: gambar,
        waktu: Date.now()
      })
      input.value = ''
    }

    document.getElementById('btnKirim').onclick = () => kirimPesan()
    document.getElementById('pesanInput').addEventListener('keypress', e => {
      if(e.key === 'Enter') kirimPesan()
    })

    document.getElementById('imgInput').onchange = e => {
      const file = e.target.files[0]
      if(!file) return
      const reader = new FileReader()
      reader.onload = () => kirimPesan(reader.result)
      reader.readAsDataURL(file)
    }
  </script>

  <script>
    if('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
    }
  </script>
</body>
</html>
