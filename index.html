<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yowasap</title>
    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075E54">
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* Background Chat Halus Khas WhatsApp */
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://githubusercontent.com');
            background-blend-mode: overlay;
            background-opacity: 0.4;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col justify-between overflow-hidden">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-[#00a884] z-50 flex flex-col items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-sm w-full text-center">
            <i class="fab fa-whatsapp text-6xl text-[#25d366] mb-4"></i>
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Masuk ke WA Clone</h2>
            <input type="text" id="username-input" placeholder="Masukkan Nama Anda..." class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-[#00a884]">
            <button onclick="loginUser()" class="w-full bg-[#00a884] text-white py-3 rounded-lg font-semibold hover:bg-[#008f72] transition">Mulai Chatting</button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div class="flex h-full w-full">
        <!-- Sidebar (Daftar Kontak/User) -->
        <div class="w-1/3 md:w-1/4 bg-white border-r flex flex-col h-full">
            <!-- Header Sidebar -->
            <div class="bg-[#f0f2f5] p-3 flex justify-between items-center border-b">
                <div class="relative group cursor-pointer">
                    <img id="my-avatar" src="https://unsplash.com" class="w-10 h-10 rounded-full object-cover border" alt="Profile">
                    <label for="upload-avatar" class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center text-white text-xs opacity-0 group-hover:opacity-100 transition cursor-pointer">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="upload-avatar" class="hidden" accept="image/*" onchange="changeProfilePic(event)">
                </div>
                <div class="flex space-x-4 text-gray-600 text-lg">
                    <button id="pwa-install-btn" class="hidden text-[#00a884]" title="Install PWA"><i class="fas fa-download"></i></button>
                    <i class="fas fa-comment-alt"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
            <!-- Daftar User Online -->
            <div class="flex-1 overflow-y-auto" id="users-list">
                <div class="p-4 text-center text-gray-500 text-sm">Mencari pengguna lain...</div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="flex-1 flex flex-col h-full bg-[#efeae2]">
            <!-- Header Chat -->
            <div class="bg-[#f0f2f5] p-3 flex justify-between items-center shadow-sm z-10">
                <div class="flex items-center space-x-3">
                    <img id="chat-active-avatar" src="https://placeholder.com" class="w-10 h-10 rounded-full object-cover" alt="">
                    <div>
                        <h3 id="chat-active-name" class="font-semibold text-gray-800">Pilih Kontak</h3>
                        <p id="chat-active-status" class="text-xs text-gray-500">Pilih teman untuk mulai chat</p>
                    </div>
                </div>
                <div class="flex space-x-5 text-gray-600 text-lg pr-2">
                    <button onclick="startVideoCall()" class="hover:text-[#00a884]" title="Video Call via Jitsi"><i class="fas fa-video"></i></button>
                    <i class="fas fa-search cursor-pointer"></i>
                    <i class="fas fa-paperclip cursor-pointer"></i>
                </div>
            </div>

            <!-- Area Pesan (Bubble Chat) -->
            <div id="chat-box" class="flex-1 chat-bg p-4 overflow-y-auto flex flex-col space-y-2">
                <div class="m-auto text-center bg-white bg-opacity-80 p-4 rounded-lg shadow text-gray-600 max-w-xs">
                    <i class="fab fa-whatsapp text-4xl text-[#25d366] mb-2"></i>
                    <p class="text-sm font-semibold">WhatsApp Clone</p>
                    <p class="text-xs mt-1">Pilih pengguna di sebelah kiri untuk memulai obrolan enkripsi realtime.</p>
                </div>
            </div>

            <!-- Input Pesan -->
            <div class="bg-[#f0f2f5] p-3 flex items-center space-x-3 border-t">
                <button class="text-gray-600 text-xl"><i class="far fa-smile"></i></button>
                <input type="text" id="message-input" oninput="notifyTyping()" placeholder="Ketik pesan..." class="flex-1 p-2.5 bg-white rounded-lg focus:outline-none text-sm shadow-sm">
                <button onclick="sendMessage()" class="bg-[#00a884] text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-[#008f72] transition shadow">
                    <i class="fas fa-paper-plane text-sm pl-0.5"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modular) & Aplikasi Logic -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, updateDoc } from "https://gstatic.com";

        // KONFIGURASI FIREBASE (Ganti dengan config Firebase Project Anda sendiri agar bekerja 100% cloud)
        const firebaseConfig = {
            apiKey: "AIzaSyFakeKey_YOUR_OWN_CONFIG",
            authDomain: "://firebaseapp.com",
            projectId: "your-app",
            storageBucket: "://appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:12345"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let activeChatUser = null;
        let typingTimeout = null;

        // 1. LOGIN SYSTEM
        window.loginUser = async () => {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return alert('Nama tidak boleh kosong');

            currentUser = {
                id: name.toLowerCase().replace(/\s+/g, '_'),
                name: name,
                avatar: document.getElementById('my-avatar').src,
                status: 'online',
                typingTo: null
            };

            // Simpan data user ke DB dan set status Online
            await setDoc(doc(db, "users", currentUser.id), currentUser);
            document.getElementById('login-screen').classList.add('hidden');
            
            // Mintakan izin Notifikasi browser
            if (Notification.permission !== "granted") Notification.requestPermission();

            listenUsers();
            trackOnlineStatus();
        };

        // 2. TRACK STATUS ONLINE / OFFLINE REALTIME
        function trackOnlineStatus() {
            window.addEventListener('beforeunload', () => {
                updateDoc(doc(db, "users", currentUser.id), { status: 'offline' });
            });
            // Update berkala detak jantung online jika diperlukan
        }

        // 3. AMBIL DAFTAR USER LAIN
        function listenUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const usersList = document.getElementById('users-list');
                usersList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const user = docSnap.data();
                    if (user.id === currentUser.id) return; // Jangan tampilkan diri sendiri

                    const userEl = document.createElement('div');
                    userEl.className = `flex items-center space-x-3 p-3 hover:bg-gray-100 cursor-pointer border-b transition ${activeChatUser?.id === user.id ? 'bg-gray-100' : ''}`;
                    userEl.onclick = () => selectUserChat(user);
                    
                    userEl.innerHTML = `
                        <div class="relative">
                            <img src="${user.avatar}" class="w-12 h-12 rounded-full object-cover border">
                            <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white ${user.status === 'online' ? 'bg-green-500' : 'bg-gray-400'}"></div>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-baseline">
                                <h4 class="font-semibold text-sm text-gray-800">${user.name}</h4>
                            </div>
                            <p class="text-xs text-gray-500 truncate">${user.typingTo === currentUser.id ? '<span class="text-green-600 font-medium">Sedang mengetik...</span>' : user.status}</p>
                        </div>
                    `;
                    usersList.appendChild(userEl);
                });
            });
        }
