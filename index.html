<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#e5ddd5;height:100vh;display:flex;flex-direction:column}
  .header{background:#075e54;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px}
  .header-left{display:flex;align-items:center;gap:12px;flex:1}
  .header-left img{width:40px;height:40px;border-radius:50%;object-fit:cover}
  .header-left b{font-size:17px}
  .chatBox{flex:1;overflow-y:auto;padding:20px;background:url('https://user-images.githubusercontent.com/1500684/45649791-55f7f580-bae8-11e8-82a4-6e65f6509a76.png') repeat;background-size:contain}
  .msg{display:flex;margin-bottom:8px}
  .msg.me{justify-content:flex-end}
  .msg.her{justify-content:flex-start}
  .bubble{max-width:65%;padding:8px 12px;border-radius:8px;font-size:15px;line-height:1.4;position:relative;word-wrap:break-word}
  .me .bubble{background:#dcf8c6;border-top-right-radius:0}
  .her .bubble{background:#fff;border-top-left-radius:0;box-shadow:0 1px 0.5px rgba(0,0,0,.13)}
  .inputBox{display:flex;padding:10px;background:#f0f0f0;gap:8px}
  .inputBox input{flex:1;padding:10px 14px;border:none;border-radius:20px;outline:none;font-size:15px}
  .inputBox button{background:#075e54;color:#fff;border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;font-size:20px}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="avatars/foto-2.png" alt="foto">
    <b>Lina</b>
  </div>
</div>

<div class="chatBox" id="chatBox"></div>

<div class="inputBox">
  <input type="text" id="input" placeholder="Ketik pesan...">
  <button onclick="sendMessage()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 1. CONFIG FIREBASE KAMU - GANTI INI
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const chatRef = db.ref('chat-anam-lina');

// 2. AUTO DETEKSI SIAPA YG BUKA
const urlParams = new URLSearchParams(window.location.search);
const user = urlParams.get('user') || 'Anam';

const myName = user; 
const myPhoto = user === 'Anam' ? 'avatars/foto-1.png' : 'avatars/foto-2.png'; 
const herPhoto = user === 'Anam' ? 'avatars/foto-2.png' : 'avatars/foto-1.png'; 
const herName = user === 'Anam' ? 'Lina' : 'Anam';

const chatBox = document.getElementById('chatBox');
const input = document.getElementById('input');

// 3. GANTI HEADER SETELAH HTML LOAD
document.addEventListener('DOMContentLoaded', function() {
  document.querySelector('.header-left b').textContent = herName;
  document.querySelector('.header-left img').src = herPhoto;
});

// 4. LOAD PESAN
chatRef.on('child_added', snapshot => {
  const msg = snapshot.val();
  const div = document.createElement('div');
  div.className = 'msg ' + (msg.name === myName ? 'me' : 'her');
  div.innerHTML = `<div class="bubble">${msg.text}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
});

// 5. KIRIM PESAN
function sendMessage() {
  const text = input.value.trim();
  if(text === '') return;
  chatRef.push({name: myName, text: text});
  input.value = '';
}

input.addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
