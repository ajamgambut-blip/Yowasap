        document.getElementById('login-screen').classList.add('hidden');

        const otherStatusRef = ref(db, `users/${targetUser}`);
        const connectedRef = ref(db, '.info/connected');

        onValue(connectedRef, (snap) => {
            if (snap.val() === false) return;
            onDisconnect(myStatusRef).update({ status: 'offline', lastSeen: serverTimestamp() })
           .then(() => { update(myStatusRef, { status: 'online', lastSeen: serverTimestamp() }); });
        });

        onValue(otherStatusRef, (snap) => {
            const data = snap.val();
            if (!data || data.status !== 'offline') {
                presenceStatusEl.textContent = 'Online'; sidebarStatusEl.textContent = 'Online'; return;
            }
            const lastSeenDate = new Date(data.lastSeen * 1000);
            const timeString = lastSeenDate.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            const text = `Terakhir dilihat ${timeString}`;
            presenceStatusEl.textContent = text; sidebarStatusEl.textContent = text;
        });
    }

        if (!currentUser) return; const chatId = [currentUser, targetUser].sort().join('_'); const typingRef = ref(db, 'typing/' + chatId + '/' + currentUser);
        set(typingRef, true); clearTimeout(typingTimeout); typingTimeout = setTimeout(() => set(typingRef, false), 2000);
    }

    window.startVideoCall = function() {
        if (!currentUser ||!targetUser) return; const roomName = 'Yowasap_' + [currentUser, targetUser].sort().join('_');
        window.open(`https://meet.jit.si/${roomName}`, '_blank');
    }

    window.logout = function() {
        if (currentUser) { update(ref(db, 'users/' + currentUser), { status: 'offline', lastSeen: serverTimestamp() }); }
        location.reload();
