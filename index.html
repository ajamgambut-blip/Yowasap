<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yowasap</title>
    
    <!-- 1. Tailwind CSS - PAKAI CDN YANG BENER -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. FontAwesome - PAKAI CDN YANG BENER -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        const manifest = {
            "name": "Yowasap Messenger",
            "short_name": "Yowasap",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0b141a",
            "theme_color": "#00a884",
            "icons": [
                {
                    "src": "https://flaticon.com",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
    </script>

    <style>
        /* Background Halus Khas WhatsApp */
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://githubusercontent.com');
            background-repeat: repeat;
            background-blend-mode: overlay;
            opacity: 0.95;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex justify-center items-center">

    <!-- Screen Login / Pilih User -->
    <div id="login-screen" class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm text-center">
        <h1 class="text-3xl font-bold text-emerald-600 mb-6"><i class="fab fa-whatsapp mr-2"></i>Yowasap</h1>
        <p class="text-gray-500 mb-4 text-sm">Masuk sebagai salah satu user untuk simulasi chat:</p>
        <div class="space-y-3">
            <button onclick="loginAs('User1', 'Anam')" class="w-full bg-emerald-600 text-white py-2 rounded shadow hover:bg-emerald-700 transition">Masuk sebagai Anam (User 1)</button>
            <button onclick="loginAs('User2', 'Lina')" class="w-full bg-blue-600 text-white py-2 rounded shadow hover:bg-blue-700 transition">Masuk sebagai Lina (User 2)</button>
        </div>
    </div>

    <!-- Screen Utama Chat -->
    <div id="main-screen" class="hidden w-full h-full max-w-5xl bg-white shadow-2xl flex rounded-none md:rounded-lg overflow-hidden">
        
        <!-- Sidebar Kiri -->
        <div class="w-1/3 border-r border-gray-200 flex flex-col bg-white">
            <!-- Header Profil Kita -->
            <div class="bg-gray-100 p-4 flex justify-between items-center border-b">
                <div class="flex items-center space-x-3">
                    <div class="relative group">
                        <img id="my-avatar" src="https://placeholder.com" class="w-10 h-10 rounded-full object-cover border">
                        <label class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center text-white text-xs opacity-0 group-hover:opacity-100 cursor-pointer transition">
                            <i class="fas fa-camera"></i>
                            <input type="file" id="upload-avatar" accept="image/*" class="hidden" onchange="changeAvatar(this)">
                        </label>
                    </div>
                    <div>
                        <h2 id="my-name" class="font-semibold text-sm text-gray-800">Nama</h2>
                        <span class="text-xs text-emerald-600 font-medium">Online</span>
                    </div>
                </div>
                <button onclick="logout()" class="text-gray-500 hover:text-red-500"><i class="fas fa-sign-out-alt"></i></button>
            </div>

            <!-- Daftar Chat (Daftar Pengguna Lain) -->
            <div class="flex-1 overflow-y-auto">
                <div onclick="selectTargetChat()" id="target-user-item" class="p-4 flex items-center space-x-3 hover:bg-gray-50 cursor-pointer bg-gray-100 transition">
                    <img id="target-avatar" src="https://placeholder.com" class="w-12 h-12 rounded-full object-cover">
                    <div class="flex-1">
                        <div class="flex justify-between items-baseline">
                            <h3 id="target-name" class="font-medium text-gray-900">Target User</h3>
                            <span id="target-status-badge" class="text-xs text-gray-400">Offline</span>
                        </div>
                        <p id="target-typing-status" class="text-xs text-gray-500 italic mt-1"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ruang Chat Kanan -->
        <div class="w-2/3 flex flex-col bg-slate-100">
            <!-- Header Ruang Chat -->
            <div class="bg-gray-100 p-4 flex justify-between items-center border-b border-gray-200">
                <div class="flex items-center space-x-3">
                    <img id="chat-header-avatar" src="https://placeholder.com" class="w-10 h-10 rounded-full object-cover">
                    <div>
                        <h3 id="chat-header-name" class="font-semibold text-gray-800">Target User</h3>
                        <p id="chat-header-status" class="text-xs text-gray-500">Offline</p>
                    </div>
                </div>
                <!-- Tombol Telepon / Video Call Jitsi -->
                <div class="flex space-x-4 text-gray-600 text-lg mr-2">
                    <button onclick="startVideoCall()" class="hover:text-emerald-600 transition p-2" title="Mulai Video Call via Jitsi"><i class="fas fa-video"></i></button>
                </div>
            </div>

            <!-- Area Isi Pesan (Scrollable dengan background khas WA) -->
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 chat-bg space-y-3">
                <!-- Pesan akan di-render di sini secara dinamis -->
            </div>

            <!-- Indikator Mengetik -->
            <div id="typing-indicator" class="px-4 py-1 text-xs text-gray-500 italic hidden bg-transparent">
                <span id="typing-text">Seseorang sedang mengetik...</span>
            </div>

            <!-- Input Bar Bawah -->
            <div class="bg-gray-100 p-3 flex items-center space-x-2 border-t">
                <input oninput="handleTyping()" type="text" id="message-input" placeholder="Ketik pesan..." class="flex-1 p-2 px-4 rounded-full border border-gray-300 focus:outline-none focus:border-emerald-500 text-sm">
                <button onclick="sendMessage()" class="bg-emerald-600 text-white w-9 h-9 rounded-full flex items-center justify-center hover:bg-emerald-700 transition shadow"><i class="fas fa-paper-plane text-sm ml-0.5"></i></button>
            </div>
        </div>

    </div>

    <!-- Firebase App dan Database SDK Modul Esensial -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi Firebase milik kamu
        const firebaseConfig = {
    apiKey: null, // <-- INI KUNCI NYA. TANPA TANDA KUTIP
    authDomain: "yowasap.firebaseapp.com",
    databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "yowasap",
    storageBucket: "yowasap.firebasestorage.app",
    messagingSenderId: "964491262310",
    appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variabel Global Aplikasi
        let currentUser = null;
        let currentName = null;
        let targetUser = null;
        let typingTimeout = null;

        // Minta Izin Notifikasi Sistem
        if ("Notification" in window) {
            Notification.requestPermission();
        }

        // Fungsi Login User
        window.loginAs = function(userId, userName) {
            currentUser = userId;
            currentName = userName;
            targetUser = userId === "User1" ? "User2" : "User1";

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');

            // Set Data Profil di Elemen HTML
            document.getElementById('my-name').innerText = currentName;
            document.getElementById('chat-header-name').innerText = targetUser === "User1" ? "Anam" : "Lina";
            document.getElementById('target-name').innerText = targetUser === "User1" ? "Anam" : "Lina";

            // Pasang status online kita ke Firebase
            const myStatusRef = ref(db, 'users/' + currentUser);
            set(myStatusRef, {
                name: currentName,
                status: "online",
                avatar: "https://dicebear.com" + userName
            });

            // Otomatis ubah status menjadi offline jika tab/browser ditutup
            onDisconnect(myStatusRef).update({ status: "offline" });

            // Dengarkan perubahan profil dan status user lawan
            listenTargetUser();
            // Jalankan sinkronisasi pesan secara real-time
            listenMessages();
        }
                // Fungsi Kirim Pesan
        window.sendMessage = function() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text === '' ||!currentUser) return;

            const chatId = [currentUser, targetUser].sort().join('_'); // biar room nya sama
            const messagesRef = ref(db, 'messages/' + chatId);
            push(messagesRef, {
                sender: currentUser,
                name: currentName,
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
            set(ref(db, 'typing/' + chatId + '/' + currentUser), false); // stop typing
        }

        // Enter = Kirim
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Fungsi Dengarkan Pesan Real-time
        window.listenMessages = function() {
            const chatId = [currentUser, targetUser].sort().join('_');
            const messagesRef = ref(db, 'messages/' + chatId);
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = ''; // kosongin dulu

            onValue(messagesRef, (snapshot) => {
                chatBox.innerHTML = '';
                snapshot.forEach((child) => {
                    const msg = child.val();
                    const isMe = msg.sender === currentUser;
                    const bubble = document.createElement('div');
                    bubble.className = `flex ${isMe? 'justify-end' : 'justify-start'}`;
                    bubble.innerHTML = `
                        <div class="max-w-xs p-3 rounded-2xl shadow ${isMe? 'bg-emerald-500 text-white rounded-br-none' : 'bg-white text-gray-800 rounded-bl-none'}">
                            <p class="text-sm">${msg.text}</p>
                        </div>
                    `;
                    chatBox.appendChild(bubble);
                });
                chatBox.scrollTop = chatBox.scrollHeight; // auto scroll bawah
            });
        }

        // Fungsi Cek Status & Typing Lawan
        window.listenTargetUser = function() {
            const targetRef = ref(db, 'users/' + targetUser);
            onValue(targetRef, (snapshot) => {
                const data = snapshot.val();
                const status = data? data.status : 'offline';
                document.getElementById('target-status-badge').innerText = status === 'online'? 'Online' : 'Offline';
                document.getElementById('chat-header-status').innerText = status === 'online'? 'Online' : 'Offline';
            });

            const chatId = [currentUser, targetUser].sort().join('_');
            const typingRef = ref(db, 'typing/' + chatId + '/' + targetUser);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                document.getElementById('typing-indicator').classList.toggle('hidden',!isTyping);
            });
        }

        // Fungsi Indikator Mengetik
        window.handleTyping = function() {
            if (!currentUser) return;
            const chatId = [currentUser, targetUser].sort().join('_');
            const typingRef = ref(db, 'typing/' + chatId + '/' + currentUser);
            set(typingRef, true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => set(typingRef, false), 2000); // 2 detik ga ngetik = mati
        }

        // Fungsi Video Call Jitsi
        window.startVideoCall = function() {
            if (!currentUser ||!targetUser) return;
            const roomName = 'Yowasap_' + [currentUser, targetUser].sort().join('_'); // nama room unik
            const jitsiUrl = `https://meet.jit.si/${roomName}`;
            window.open(jitsiUrl, '_blank'); // buka di tab baru
        }

        // Fungsi Logout
        window.logout = function() {
            if (currentUser) {
                set(ref(db, 'users/' + currentUser + '/status'), 'offline');
            }
            location.reload(); // balik ke login
        }

        // Fungsi Ganti Avatar - versi simpel
        window.changeAvatar = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('my-avatar').src = e.target.result;
                    if(currentUser) set(ref(db, 'users/' + currentUser + '/avatar'), e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
            </script>
</body>
</html>
