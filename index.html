<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yowasap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  .chat-bg { background-image: url('https://i.imgur.com/5m3M6H4.png'); background-size: 400px; }
  .bubble { animation: slideUp 0.2s ease-out; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .date-divider { background: rgba(225,245,254,0.92); }
  </style>
</head>
<body class="bg-[#e5ddd5] h-screen flex-col">

  <!-- HEADER -->
  <div class="bg-[#075e54] text-white p-3 flex items-center gap-3 shadow-md">
    <div id="myAvatar" class="w-10 h-10 bg-gray-400 rounded-full flex items-center justify-center font-bold cursor-pointer">Y</div>
    <div class="flex-1">
      <h1 class="font-semibold">Yowasap Group</h1>
      <p id="status" class="text-xs opacity-80">online</p>
    </div>
  </div>

  <!-- SETTING NAMA + FOTO -->
  <div class="p-2 bg-white/90 backdrop-blur text-xs flex items-center gap-2 border-b">
    <span>Nama:</span>
    <input id="namaInput" value="Aku" class="bg-gray-100 border-none rounded-full px-3 py-1 w-28 text-sm focus:outline-none focus:ring-2 focus:ring-[#25d366]">
    <input type="file" id="fotoInput" accept="image/*" class="text-xs">
  </div>

  <!-- CHAT AREA -->
  <div id="chatBox" class="flex-1 p-4 overflow-y-auto space-y-1 chat-bg"></div>

  <!-- INPUT BAWAH -->
  <div class="p-2 bg-[#f0f0f0] flex items-end gap-2">
    <label class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm cursor-pointer">
      <input type="file" id="imgInput" accept="image/*" class="hidden">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
    </label>
    <input id="pesanInput" type="text" placeholder="Ketik pesan..." class="flex-1 bg-white rounded-full px-4 py-2.5 text-sm focus:outline-none shadow-sm">
    <button id="btnKirim" class="bg-[#25d366] hover:bg-[#22c55e] text-white rounded-full w-12 h-12 flex items-center justify-center shadow-md transition">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 ml-0.5"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
    import { getDatabase, ref, push, onValue, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js'
    import { getStorage, ref as sRef, uploadString, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js'

    const firebaseConfig = {
      apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
      authDomain: "yowasap.firebaseapp.com",
      databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "yowasap",
      storageBucket: "yowasap.firebasestorage.app",
      messagingSenderId: "964491262310",
      appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
    }

    const app = initializeApp(firebaseConfig)
    const db = getDatabase(app)
    const storage = getStorage(app)
    const pesanRef = ref(db, 'pesan')

    const namaInput = document.getElementById('namaInput')
    const myName = () => namaInput.value || 'Aku'
    let myPhoto = localStorage.getItem('yowasap_photo') || null

    // SET FOTO PROFIL HEADER
    function setAvatar(url) {
      const av = document.getElementById('myAvatar')
      if(url) av.innerHTML = `<img src="${url}" class="w-full h-full rounded-full object-cover">`
      else av.innerHTML = myName().charAt(0).toUpperCase()
    }
    setAvatar(myPhoto)

    document.getElementById('fotoInput').onchange = e => {
      const file = e.target.files[0]
      if(!file) return
      const reader = new FileReader()
      reader.onload = () => {
        myPhoto = reader.result
        localStorage.setItem('yowasap_photo', myPhoto)
        setAvatar(myPhoto)
      }
      reader.readAsDataURL(file)
    }

    // STATUS ONLINE
    document.getElementById('status').textContent = 'online'
    window.onblur = () => document.getElementById('status').textContent = 'terakhir dilihat barusan'
    window.onfocus = () => document.getElementById('status').textContent = 'online'

    let lastDate = ''

    onValue(pesanRef, (snapshot) => {
      const chatBox = document.getElementById('chatBox')
      chatBox.innerHTML = ''
      const data = snapshot.val()
      lastDate = ''

      if(!data) {
        chatBox.innerHTML = `<div class="text-center text-gray-500 text-sm mt-20 bg-white/70 rounded-full px-4 py-2 w-fit mx-auto">Mulai percakapan 🔒 Enkripsi end-to-end</div>`
        return
      }

      Object.values(data).forEach(p => {
        const msgDate = new Date(p.waktu).toLocaleDateString('id-ID')
        if(msgDate!== lastDate) {
          lastDate = msgDate
          const divider = document.createElement('div')
          divider.className = 'text-center my-3'
          divider.innerHTML = `<span class="date-divider text-xs text-gray-600 px-3 py-1 rounded-full">${msgDate === new Date().toLocaleDateString('id-ID')? 'Hari ini' : msgDate}</span>`
          chatBox.appendChild(divider)
        }

        const isMe = p.pengirim === myName()
        const bubble = document.createElement('div')
        bubble.className = `flex ${isMe? 'justify-end' : 'justify-start'} bubble`

        const checkmarks = isMe?
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 11" width="16" height="11" class="inline ml-1"><path fill="#53bdeb" d="M15.01 3.316l-.478-.372a.365.365 0 0 0-.51.063L8.666 9.879a.32.32 0 0 1-.484.033l-.358-.325a.319.319 0 0 0-.484.032l-.378.483a.418.418 0 0 0.036.541l1.32 1.266c.143.14.361.125.484-.033l6.272-8.048a.366.366 0 0 0-.064-.512zm-4.1 0l-.478-.372a.365.365 0 0 0-.51.063L4.566 9.879a.32.32 0 0 1-.484.033L1.891 7.769a.366.366 0 0 0-.515.006l-.423.433a.364.364 0 0 0.006.514l3.258 3.185c.143.14.361.125.484-.033l6.272-8.048a.365.365 0 0 0-.063-.51z"/></svg>` : ''

        const imgContent = p.gambar? `<img src="${p.gambar}" class="rounded-lg max-w-[200px] mb-1">` : ''

        bubble.innerHTML = `
          <div class="max-w-[75%]">
            ${!isMe? `<div class="text- text-[#128c7e] font-semibold mb-0.5 ml-2">${p.pengirim}</div>` : ''}
            <div class="${isMe? 'bg-[#dcf8c6] text-gray-800 rounded-2xl rounded-tr-sm' : 'bg-white text-gray-800 rounded-2xl rounded-tl-sm shadow-sm'} px-3 py-2 text-sm">
              ${imgContent}
              ${p.isi || ''}
              <div class="text- text-gray-500 text-right mt-1 flex items-center justify-end gap-1">
                ${new Date(p.waktu).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}
                ${checkmarks}
              </div>
            </div>
          </div>`
        chatBox.appendChild(bubble)
      })
      chatBox.scrollTop = chatBox.scrollHeight
    })

    async function kirimPesan(gambar = null) {
      const input = document.getElementById('pesanInput')
      const text = input.value.trim()
      if(text === '' &&!gambar) return

      await push(pesanRef, {
        pengirim: myName(),
        isi: text,
        gambar: gambar,
        foto: myPhoto,
        waktu: Date.now()
      })
      input.value = ''
    }

    document.getElementById('btnKirim').onclick = () => kirimPesan()
    document.getElementById('pesanInput').addEventListener('keypress', e => {
      if(e.key === 'Enter') kirimPesan()
    })

    // KIRIM GAMBAR
    document.getElementById('imgInput').onchange = e => {
      const file = e.target.files[0]
      if(!file) return
      const reader = new FileReader()
      reader.onload = () => kirimPesan(reader.result)
      reader.readAsDataURL(file)
    }
  </script>
</body>
</html>
