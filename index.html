<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yowasap v2</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ece5dd;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.header {
  background: #075E54;
  color: white;
  padding: 12px;
  font-weight: bold;
}

#chatBox {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.msg {
  max-width: 75%;
  padding: 8px 10px;
  border-radius: 8px;
  background: white;
  align-self: flex-start;
}

.msg.me {
  background: #dcf8c6;
  align-self: flex-end;
}

.time {
  font-size: 10px;
  color: gray;
  margin-left: 6px;
}

.input-area {
  display: flex;
  padding: 8px;
  background: #f0f0f0;
  gap: 6px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  background: #075E54;
  color: white;
  border: none;
  width: 44px;
  border-radius: 50%;
}
</style>
</head>

<body>

<div class="header" id="header">Yowasap</div>

<div id="chatBox"></div>

<div class="input-area">
  <input id="input" placeholder="Ketik pesan...">
  <button onclick="sendMessage()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= AUTH ANON ================= */
let myId = null;

firebase.auth().signInAnonymously()
.then(user => {
  myId = user.user.uid;
  initChat();
});

/* ================= ROOM ================= */
const roomId = prompt("Masukkan Room ID (contoh: lina-anam)") || "default-room";
document.getElementById("header").innerText = "Room: " + roomId;

const chatRef = db.ref("chats/" + roomId + "/messages");

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("input");

/* ================= SEND MESSAGE ================= */
function sendMessage() {
  if (!input.value.trim()) return;

  const msg = {
    text: input.value,
    senderId: myId,
    timestamp: Date.now()
  };

  chatRef.push(msg);
  input.value = "";
}

/* ================= RENDER SINGLE ================= */
function renderMessage(msg, isMe) {
  const div = document.createElement("div");
  div.className = "msg" + (isMe ? " me" : "");

  const time = new Date(msg.timestamp).toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });

  div.innerHTML = `
    ${msg.text}
    <span class="time">${time}</span>
  `;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ================= INIT CHAT ================= */
function initChat() {

  chatRef.on("child_added", snap => {
    const msg = snap.val();
    const isMe = msg.senderId === myId;
    renderMessage(msg, isMe);
  });

}

/* ================= ENTER KEY ================= */
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
