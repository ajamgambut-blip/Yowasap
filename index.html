<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Yowasap</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#075E54">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yowasap">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #ece5dd;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #075E54;
  color: white;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  height: 56px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 2;
}
.header-left img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}
.header-left .name b { font-size: 17px; }
.header-left .name span { font-size: 12px; opacity: 0.9; }

.header-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}
.header-center img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid white;
}

.header-icons {
  display: flex;
  gap: 18px;
  font-size: 22px;
  z-index: 2;
}
.header-icons a { color: white; text-decoration: none; }

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 10px;
  background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
  background-size: cover;
}
.msg {
  display: flex;
  gap: 8px;
  margin: 8px 0;
  max-width: 80%;
}
.msg.me {
  margin-left: auto;
  flex-direction: row-reverse;
}
.bubble-photo {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
  align-self: flex-end;
  margin-bottom: 4px;
}
.bubble {
  background: white;
  padding: 8px 12px;
  border-radius: 8px;
  box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
  position: relative;
  word-wrap: break-word;
  max-width: calc(100% - 40px);
}
.msg.me .bubble {
  background: #dcf8c6;
}
.time {
  font-size: 11px;
  color: #667781;
  margin-left: 8px;
  float: right;
}
.input-area {
  display: flex;
  padding: 8px;
  background: #f0f0f0;
  gap: 8px;
}
.input-area input {
  flex: 1;
  border: none;
  border-radius: 20px;
  padding: 10px 16px;
  outline: none;
  font-size: 15px;
}
.input-area button {
  background: #075E54;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  color: white;
  font-size: 20px;
  cursor: pointer;
}
.jismeet-btn {
  background: #128C7E;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  margin: 10px auto;
  display: block;
  cursor: pointer;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <img src="avatars/foto-1.png" alt="Anam">
    <div class="name">
      <b>Lina</b>
      <span id="status">online</span>
    </div>
  </div>
  
  <div class="header-center">
    <img src="avatars/foto-grup.png" alt="Grup">
  </div>
  
  <div class="header-icons">
    <a href="https://meet.jit.si/yowasap-lina-anam" target="_blank">📹</a>
    <a href="tel:">📞</a>
    <span>⋮</span>
  </div>
</div>

<button class="jismeet-btn" onclick="window.open('https://meet.jit.si/yowasap-lina-anam','_blank')">Mulai Video Call</button>

<div class="chat" id="chatBox"></div>

<div class="input-area">
  <input id="input" placeholder="Ketik pesan..." autocomplete="off">
  <button onclick="sendMessage()">➤</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const chatRef = db.ref('chat-anam-lina');

let messages = [];
const chatBox = document.getElementById('chatBox');
const input = document.getElementById('input');
const myName = 'Anam'; 
const myPhoto = 'avatars/foto-1.png'; 
const herPhoto = 'avatars/foto-2.png'; 

// Load chat real-time
chatRef.on('child_added', snapshot => {
  const msg = snapshot.val();
  messages.push(msg);
  localStorage.setItem('yowasap-chat', JSON.stringify(messages));
  renderMessages();
});

function renderMessages() {
  chatBox.innerHTML = '';
  messages.forEach(msg => {
    const isMe = msg.sender === myName;
    const div = document.createElement('div');
    div.className = isMe ? 'msg me' : 'msg';
    
    const photo = document.createElement('img');
    photo.className = 'bubble-photo';
    photo.src = isMe ? myPhoto : herPhoto;
    photo.onerror = () => photo.style.display = 'none'; // kalo foto ga ada ga bikin rusak
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = msg.text + `<span class="time">${msg.time}</span>`;
    
    div.appendChild(photo);
    div.appendChild(bubble);
    chatBox.appendChild(div);
  });
  chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
  if(input.value.trim() === '') return;
  const newMsg = {
    text: input.value,
    sender: myName,
    time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
  };
  chatRef.push(newMsg);
  input.value = '';
}

input.addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMessage();
});

// Load backup lokal dulu
messages = JSON.parse(localStorage.getItem('yowasap-chat')) || [];
renderMessages();

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
