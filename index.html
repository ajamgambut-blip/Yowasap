<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yowasap</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#075E54">
    <!-- Menggunakan Link CSS Stabil agar tampilan tidak rusak di HP -->
    <link href="https://cloudflare.com" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        .chat-bg {
            background-color: #efeae2;
            background-image: url('https://githubusercontent.com');
            background-blend-mode: overlay;
            opacity: 0.95;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col justify-between overflow-hidden m-0 p-0">

    <!-- LOGIN SCREEN (Menutupi layar penuh sebelum masuk) -->
    <div id="login-screen" class="fixed inset-0 bg-green-600 z-50 flex flex-col items-center justify-center p-4">
        <div class="bg-white p-8 rounded-lg shadow-lg max-w-sm w-full text-center">
            <i class="fab fa-whatsapp text-6xl text-green-500 mb-4"></i>
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Masuk ke WA Clone</h2>
            <input type="text" id="username-input" placeholder="Masukkan Nama Anda..." class="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-green-500">
            <button onclick="loginUser()" class="w-full bg-green-500 text-white py-3 rounded-lg font-semibold hover:bg-green-600 transition">Mulai Chatting</button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div class="flex h-full w-full">
        <!-- Sidebar -->
        <div class="w-1/3 md:w-1/4 bg-white border-r flex flex-col h-full">
            <div class="bg-gray-200 p-3 flex justify-between items-center border-b">
                <div class="relative flex items-center">
                    <img id="my-avatar" src="https://unsplash.com" class="w-10 h-10 rounded-full object-cover border" alt="Profile">
                    <label for="upload-avatar" class="absolute inset-0 bg-black bg-opacity-40 rounded-full flex items-center justify-center text-white text-xs opacity-0 hover:opacity-100 transition cursor-pointer">
                        <i class="fas fa-camera"></i>
                    </label>
                    <input type="file" id="upload-avatar" class="hidden" accept="image/*" onchange="changeProfilePic(event)">
                </div>
                <div class="flex space-x-4 text-gray-600 text-lg">
                    <button id="pwa-install-btn" class="hidden text-green-600"><i class="fas fa-download"></i></button>
                    <i class="fas fa-comment-alt"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
            <!-- Daftar Kontak Aktif -->
            <div class="flex-1 overflow-y-auto" id="users-list">
                <div class="p-4 text-center text-gray-500 text-sm">Mencari pengguna lain...</div>
            </div>
        </div>

        <!-- Chat Window -->
        <div class="flex-1 flex flex-col h-full bg-gray-200">
            <!-- Header Chat -->
            <div class="bg-gray-200 p-3 flex justify-between items-center shadow-sm z-10 border-b">
                <div class="flex items-center space-x-3">
                    <img id="chat-active-avatar" src="https://placeholder.com" class="w-10 h-10 rounded-full object-cover" alt="">
                    <div>
                        <h3 id="chat-active-name" class="font-semibold text-gray-800 text-sm md:text-base">Pilih Kontak</h3>
                        <p id="chat-active-status" class="text-xs text-gray-500">Pilih teman di kiri</p>
                    </div>
                </div>
                <div class="flex space-x-4 text-gray-600 text-lg pr-2">
                    <button onclick="startVideoCall()" class="hover:text-green-600"><i class="fas fa-video"></i></button>
                    <i class="fas fa-search"></i>
                </div>
            </div>

            <!-- Area Isi Pesan -->
            <div id="chat-box" class="flex-1 chat-bg p-4 overflow-y-auto flex flex-col space-y-2">
                <div class="m-auto text-center bg-white bg-opacity-90 p-4 rounded-lg shadow text-gray-600 max-w-xs">
                    <i class="fab fa-whatsapp text-4xl text-green-500 mb-2"></i>
                    <p class="text-sm font-semibold">WhatsApp Clone</p>
                    <p class="text-xs mt-1">Pilih teman di daftar kiri untuk mulai berkirim pesan secara realtime.</p>
                </div>
            </div>

            <!-- Input Pesan -->
            <div class="bg-gray-200 p-3 flex items-center space-x-3 border-t">
                <input type="text" id="message-input" oninput="notifyTyping()" placeholder="Ketik pesan..." class="flex-1 p-2 bg-white rounded-lg focus:outline-none text-sm shadow-sm">
                <button onclick="sendMessage()" class="bg-green-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-green-600 transition shadow">
                    <i class="fas fa-paper-plane text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, serverTimestamp, updateDoc } from "https://gstatic.com";

        // SILAKAN GANTI DENGAN CONFIG FIREBASE MILIK ANDA SENDIRI
        const firebaseConfig = {
  apiKey: "AIzaSyCZHdGHSMBT8g8xs2H78yhDx0dbEv2H0xg",
  authDomain: "yowasap.firebaseapp.com",
  databaseURL: "https://yowasap-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "yowasap",
  storageBucket: "yowasap.firebasestorage.app",
  messagingSenderId: "964491262310",
  appId: "1:964491262310:web:086e5f2cbf0af8398870a7"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null;
        let activeChatUser = null;
        let typingTimeout = null;

        window.loginUser = async () => {
            const name = document.getElementById('username-input').value.trim();
            if (!name) return alert('Nama tidak boleh kosong');

            currentUser = {
                id: name.toLowerCase().replace(/\s+/g, '_'),
                name: name,
                avatar: document.getElementById('my-avatar').src,
                status: 'online',
                typingTo: null
            };

            await setDoc(doc(db, "users", currentUser.id), currentUser);
            document.getElementById('login-screen').classList.add('hidden');
            
            if (Notification.permission !== "granted") Notification.requestPermission();

            listenUsers();
        };

        function listenUsers() {
            onSnapshot(collection(db, "users"), (snapshot) => {
                const usersList = document.getElementById('users-list');
                usersList.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const user = docSnap.data();
                    if (user.id === currentUser.id) return;

                    const userEl = document.createElement('div');
                    userEl.className = `flex items-center space-x-3 p-3 hover:bg-gray-100 cursor-pointer border-b transition ${activeChatUser?.id === user.id ? 'bg-gray-300' : ''}`;
                    userEl.onclick = () => selectUserChat(user);
                    
                    userEl.innerHTML = `
                        <div class="relative">
                            <img src="${user.avatar}" class="w-12 h-12 rounded-full object-cover border">
                            <div class="absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-white ${user.status === 'online' ? 'bg-green-500' : 'bg-gray-400'}"></div>
                        </div>
                        <div class="flex-1 hidden md:block">
                            <h4 class="font-semibold text-sm text-gray-800">${user.name}</h4>
                            <p class="text-xs text-gray-500 truncate">${user.typingTo === currentUser.id ? '<span class="text-green-600 font-medium">Sedang mengetik...</span>' : user.status}</p>
                        </div>
                    `;
                    usersList.appendChild(userEl);
                });
            });
        }

        let unsubscribeChat = null;
        function selectUserChat(user) {
            activeChatUser = user;
            document.getElementById('chat-active-name').innerText = user.name;
            document.getElementById('chat-active-avatar').src = user.avatar;
            document.getElementById('chat-active-status').innerText = user.status === 'online' ? 'Online' : 'Offline';

            if (unsubscribeChat) unsubscribeChat();

            const chatRoomId = [currentUser.id, user.id].sort().join('_vs_');

            const q = query(collection(db, "rooms", chatRoomId, "messages"), orderBy("timestamp", "asc"));
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = '';
                
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    const isMe = msg.senderId === currentUser.id;
                    
                    if(!isMe && !msg.read) {
